name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  preflight:
    runs-on: ubuntu-22.04
    outputs:
      prerelease: ${{ steps.classify.outputs.prerelease }}
      npm-tag: ${{ steps.classify.outputs.npm-tag }}
      version: ${{ steps.classify.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Require an exact, synchronized release tag
        run: python3 scripts/version_tool.py check --tag "${{ github.ref_name }}"

      - name: Classify release
        id: classify
        shell: bash
        run: |
          version="${{ github.ref_name }}"
          version="${version#v}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          if [[ "$version" =~ -(alpha|beta|rc)\.[0-9]+$ ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "npm-tag=next" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "npm-tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Require publication credentials
        env:
          PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        shell: bash
        run: |
          test -n "$PYPI_API_TOKEN" || { echo "PYPI_API_TOKEN is required" >&2; exit 1; }
          test -n "$NPM_TOKEN" || { echo "NPM_TOKEN is required" >&2; exit 1; }
          test -n "$CARGO_REGISTRY_TOKEN" || { echo "CARGO_REGISTRY_TOKEN is required" >&2; exit 1; }
          if [[ "${{ steps.classify.outputs.prerelease }}" == "false" ]]; then
            test -n "$HOMEBREW_TAP_TOKEN" || { echo "HOMEBREW_TAP_TOKEN is required for stable releases" >&2; exit 1; }
          fi

  native-unix:
    needs: preflight
    name: native-${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            name: linux-x64
          - os: ubuntu-24.04-arm
            name: linux-arm64
          - os: macos-14
            name: macos-arm64
          - os: macos-15-intel
            name: macos-x64
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ninja-build libomp-dev liblapacke-dev libopenblas-dev libssl-dev pkg-config

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: brew install libomp openssl@3 pkg-config

      - name: Configure portable release
        run: >-
          cmake -S . -B build-release -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DQSIM_BUILD_EXAMPLES=OFF
          -DQSIM_BUILD_BENCHMARKS=OFF
          -DQSIM_NATIVE_ARCH=OFF
          -DQSIM_FAST_MATH=OFF
          -DQSIM_WERROR=ON

      - name: Build and test
        run: |
          cmake --build build-release --parallel 2
          ctest --test-dir build-release --output-on-failure --timeout 180 -L "(core|abi|topology|health)" -LE "long|memory_heavy" --parallel 2

      - name: Package and verify external consumer
        run: |
          scripts/package_release_artifact.sh \
            --build-dir build-release \
            --output moonlab-${{ github.ref_name }}-${{ matrix.name }}.tar.gz
          scripts/verify_release_package.sh \
            --package moonlab-${{ github.ref_name }}-${{ matrix.name }}.tar.gz

      - uses: actions/upload-artifact@v7
        with:
          name: native-${{ matrix.name }}
          path: moonlab-${{ github.ref_name }}-${{ matrix.name }}.tar.gz
          if-no-files-found: error
          retention-days: 7

  native-windows:
    needs: preflight
    name: native-${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: windows-x64
            arch: x64
          - os: windows-11-arm
            name: windows-arm64
            arch: arm64
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Build, test, package, and verify
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          .\scripts\build_windows_artifact.ps1 `
            -Arch '${{ matrix.arch }}' `
            -BuildDir 'build-windows-${{ matrix.arch }}' `
            -Output '${{ runner.temp }}\moonlab-${{ github.ref_name }}-${{ matrix.name }}.zip'

      - uses: actions/upload-artifact@v7
        with:
          name: native-${{ matrix.name }}
          path: ${{ runner.temp }}\moonlab-${{ github.ref_name }}-${{ matrix.name }}.zip
          if-no-files-found: error
          retention-days: 7

  debian:
    needs: preflight
    name: debian-${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            arch: amd64
          - os: ubuntu-24.04-arm
            arch: arm64
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build libomp-dev libopenblas-dev liblapacke-dev libssl-dev dpkg-dev pkg-config

      - name: Build and verify Debian package
        run: |
          scripts/build-deb.sh "${{ needs.preflight.outputs.version }}"
          dpkg-deb --info moonlab_${{ needs.preflight.outputs.version }}_${{ matrix.arch }}.deb
          scripts/verify_deb_package.sh --package moonlab_${{ needs.preflight.outputs.version }}_${{ matrix.arch }}.deb

      - uses: actions/upload-artifact@v7
        with:
          name: debian-${{ matrix.arch }}
          path: moonlab_${{ needs.preflight.outputs.version }}_${{ matrix.arch }}.deb
          if-no-files-found: error
          retention-days: 7

  python-wheels:
    needs: preflight
    name: wheel-${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            name: linux-x64
            arch: x86_64
            macos-target: ""
          - os: ubuntu-24.04-arm
            name: linux-arm64
            arch: aarch64
            macos-target: ""
          - os: macos-14
            name: macos-arm64
            arch: arm64
            macos-target: "11.0"
          - os: macos-15-intel
            name: macos-x64
            arch: x86_64
            macos-target: "10.15"
          - os: windows-latest
            name: windows-x64
            arch: AMD64
            macos-target: ""
          - os: windows-11-arm
            name: windows-arm64
            arch: ARM64
            macos-target: ""
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install wheel builder
        run: python -m pip install cibuildwheel==4.1.0

      - name: Build, repair, and test wheel
        env:
          CIBW_BUILD: cp311-*
          CIBW_ARCHS: ${{ matrix.arch }}
          MACOSX_DEPLOYMENT_TARGET: ${{ matrix.macos-target }}
          CIBW_BUILD_FRONTEND: build[uv]
          CIBW_MANYLINUX_X86_64_IMAGE: manylinux_2_28
          CIBW_MANYLINUX_AARCH64_IMAGE: manylinux_2_28
          CIBW_BEFORE_ALL_LINUX: dnf install -y openblas-devel lapack-devel
          CIBW_BEFORE_BUILD_WINDOWS: python -m pip install ninja
          CIBW_ENVIRONMENT_WINDOWS: CC=clang-cl CXX=clang-cl CMAKE_GENERATOR=Ninja
          CIBW_TEST_REQUIRES: numpy
          CIBW_TEST_COMMAND: >-
            python -c "import moonlab; from moonlab import QuantumState; from moonlab.crypto import mlkem;
            q=QuantumState(2); q.h(0); q.cnot(0,1); pk,sk=mlkem.keygen_qrng(); s=mlkem.qrng_status();
            assert len(pk)==800 and len(sk)==1632 and s['continuous_health_tests'] and s['shake256_conditioned'] and s['bell_epoch_certified']"
        run: python -m cibuildwheel bindings/python --output-dir wheelhouse

      - uses: actions/upload-artifact@v7
        with:
          name: python-${{ matrix.name }}
          path: wheelhouse/*.whl
          if-no-files-found: error
          retention-days: 7

  npm-packages:
    needs: preflight
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          package-manager-cache: false

      - uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - uses: mymindstorm/setup-emsdk@v14
        with:
          version: 4.0.22

      - name: Build WASM BLAS
        run: bindings/javascript/packages/core/emscripten/build-clapack-wasm.sh

      - name: Install, build, and test workspace
        working-directory: bindings/javascript
        run: |
          pnpm install --frozen-lockfile
          pnpm run build
          pnpm test

      - name: Pack and verify exact npm artifacts
        run: |
          scripts/package_npm.sh "$RUNNER_TEMP/npm"
          node scripts/verify_npm_packages.mjs "$RUNNER_TEMP/npm"

      - uses: actions/upload-artifact@v7
        with:
          name: npm-packages
          path: ${{ runner.temp }}/npm/*.tgz
          if-no-files-found: error
          retention-days: 7

  rust-crates:
    needs: [preflight, native-unix]
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/download-artifact@v7
        with:
          name: native-linux-x64
          path: native

      - name: Install Rust and native runtime dependencies
        run: |
          rustup toolchain install 1.86.0 --profile minimal
          rustup default 1.86.0
          sudo apt-get update
          sudo apt-get install -y libclang-dev libomp-dev libopenblas-dev liblapacke-dev libssl-dev pkg-config

      - name: Extract the tested native SDK
        shell: bash
        run: |
          mkdir -p "$RUNNER_TEMP/moonlab-sdk"
          tar -xzf "native/moonlab-${{ github.ref_name }}-linux-x64.tar.gz" \
            -C "$RUNNER_TEMP/moonlab-sdk"

      - name: Test Rust bindings and publication metadata
        env:
          PKG_CONFIG_PATH: ${{ runner.temp }}/moonlab-sdk/lib/pkgconfig
          LD_LIBRARY_PATH: ${{ runner.temp }}/moonlab-sdk/lib
        shell: bash
        run: |
          cargo test --manifest-path bindings/rust/moonlab/Cargo.toml
          cargo check --manifest-path bindings/rust/moonlab-tui/Cargo.toml
          cargo publish --manifest-path bindings/rust/moonlab-sys/Cargo.toml --dry-run
          cargo package --manifest-path bindings/rust/moonlab/Cargo.toml --list >/dev/null
          cargo package --manifest-path bindings/rust/moonlab-tui/Cargo.toml --list >/dev/null

  draft-release:
    needs: [preflight, native-unix, native-windows, debian, python-wheels, npm-packages, rust-crates]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/download-artifact@v7
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        working-directory: dist
        run: shasum -a 256 * > SHA256SUMS

      - name: Create fully populated draft release
        uses: softprops/action-gh-release@v3
        with:
          name: Moonlab ${{ github.ref_name }}
          draft: true
          prerelease: ${{ needs.preflight.outputs.prerelease == 'true' }}
          fail_on_unmatched_files: true
          files: dist/*
          body: |
            See CHANGELOG.md and the release notes in `docs/release/` for details.

            Install after this draft has passed registry publication:

            ```bash
            brew tap tsotchke/moonlab
            brew install moonlab
            pip install moonlab
            npm install @moonlab/quantum-core
            cargo install moonlab-tui
            ```

            Native archives cover Linux, macOS, and Windows on x64 and ARM64.
            `SHA256SUMS` authenticates every attached release artifact.

  publish-python:
    needs: [preflight, draft-release]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/download-artifact@v7
        with:
          pattern: python-*
          path: dist/python
          merge-multiple: true

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Validate and publish wheels
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          python -m pip install twine
          python -m twine check dist/python/*
          python -m twine upload --non-interactive dist/python/*

  publish-npm:
    needs: [preflight, draft-release]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: npm-packages
          path: dist/npm

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Publish exact tested tarballs
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TAG: ${{ needs.preflight.outputs.npm-tag }}
          VERSION: ${{ needs.preflight.outputs.version }}
        shell: bash
        run: |
          for package in core algorithms viz react vue; do
            artifact="dist/npm/moonlab-quantum-${package}-${VERSION}.tgz"
            test -f "$artifact"
            npm publish "$artifact" --tag "$NPM_TAG" --access public --provenance
          done

  publish-rust:
    needs: [preflight, draft-release]
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/download-artifact@v7
        with:
          name: native-linux-x64
          path: native

      - name: Install Rust and native runtime dependencies
        run: |
          rustup toolchain install 1.86.0 --profile minimal
          rustup default 1.86.0
          sudo apt-get update
          sudo apt-get install -y libclang-dev libomp-dev libopenblas-dev liblapacke-dev libssl-dev pkg-config

      - name: Extract the tested native SDK
        shell: bash
        run: |
          mkdir -p "$RUNNER_TEMP/moonlab-sdk"
          tar -xzf "native/moonlab-${{ github.ref_name }}-linux-x64.tar.gz" \
            -C "$RUNNER_TEMP/moonlab-sdk"

      - name: Publish crates in dependency order
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          PKG_CONFIG_PATH: ${{ runner.temp }}/moonlab-sdk/lib/pkgconfig
          LD_LIBRARY_PATH: ${{ runner.temp }}/moonlab-sdk/lib
          VERSION: ${{ needs.preflight.outputs.version }}
        shell: bash
        run: |
          wait_for_crate() {
            local crate="$1"
            for attempt in {1..30}; do
              if cargo info "${crate}@${VERSION}" >/dev/null 2>&1; then
                return 0
              fi
              echo "waiting for crates.io index: ${crate} ${VERSION} (attempt ${attempt}/30)"
              sleep 10
            done
            echo "crates.io did not index ${crate} ${VERSION} in time" >&2
            return 1
          }

          cargo publish --manifest-path bindings/rust/moonlab-sys/Cargo.toml
          wait_for_crate moonlab-sys
          cargo publish --manifest-path bindings/rust/moonlab/Cargo.toml
          wait_for_crate moonlab
          cargo publish --manifest-path bindings/rust/moonlab-tui/Cargo.toml

  update-homebrew:
    needs: [preflight, draft-release, publish-python, publish-npm, publish-rust]
    if: needs.preflight.outputs.prerelease == 'false'
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Materialize stable formula
        env:
          VERSION: ${{ needs.preflight.outputs.version }}
          TAG: ${{ github.ref_name }}
        shell: bash
        run: |
          source_url="https://github.com/tsotchke/moonlab/archive/refs/tags/${TAG}.tar.gz"
          sha256="$(curl -fsSL "$source_url" | shasum -a 256 | cut -d ' ' -f 1)"
          sed -i '' -E "s|url \".*\"|url \"${source_url}\"|" packaging/homebrew/moonlab.rb
          sed -i '' -E "s|sha256 \".*\"|sha256 \"${sha256}\"|" packaging/homebrew/moonlab.rb
          grep -F "url \"${source_url}\"" packaging/homebrew/moonlab.rb
          grep -F "sha256 \"${sha256}\"" packaging/homebrew/moonlab.rb

      - name: Prepare tap checkout
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          gh auth setup-git
          gh repo clone tsotchke/homebrew-moonlab tap
          mkdir -p tap/Formula
          cp packaging/homebrew/moonlab.rb tap/Formula/moonlab.rb

      - name: Audit and install formula from source
        run: |
          brew tap tsotchke/moonlab "$PWD/tap"
          brew audit --formula --strict tsotchke/moonlab/moonlab
          brew install --build-from-source tsotchke/moonlab/moonlab
          brew test tsotchke/moonlab/moonlab

      - name: Push formula to tap
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          git -C tap config user.name "Moonlab Release Bot"
          git -C tap config user.email "actions@github.com"
          git -C tap add Formula/moonlab.rb
          git -C tap diff --cached --check
          git -C tap commit -m "moonlab ${{ github.ref_name }}"
          git -C tap push origin HEAD:main

  finalize-release:
    needs: [preflight, draft-release, publish-python, publish-npm, publish-rust, update-homebrew]
    if: >-
      always() &&
      needs.draft-release.result == 'success' &&
      needs.publish-python.result == 'success' &&
      needs.publish-npm.result == 'success' &&
      needs.publish-rust.result == 'success' &&
      (needs.update-homebrew.result == 'success' || needs.update-homebrew.result == 'skipped')
    runs-on: ubuntu-22.04
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Publish GitHub release only after every registry succeeds
        shell: bash
        run: |
          if [[ "${{ needs.preflight.outputs.prerelease }}" == "true" ]]; then
            gh release edit "${{ github.ref_name }}" --repo "${{ github.repository }}" --draft=false --prerelease
          else
            gh release edit "${{ github.ref_name }}" --repo "${{ github.repository }}" --draft=false --latest
          fi
