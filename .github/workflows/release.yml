name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Exact release version to build as an unpublished candidate
        required: true
        type: string
  push:
    tags:
      - "v*"

permissions:
  actions: read
  contents: read
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  preflight:
    runs-on: ubuntu-22.04
    outputs:
      prerelease: ${{ steps.classify.outputs.prerelease }}
      npm-tag: ${{ steps.classify.outputs.npm-tag }}
      version: ${{ steps.classify.outputs.version }}
      tag: ${{ steps.classify.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Classify and require an exact synchronized release identity
        id: classify
        shell: bash
        env:
          DISPATCH_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            [[ "$DISPATCH_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-(alpha|beta|rc)\.[0-9]+)?$ ]] || {
              echo "workflow_dispatch version is invalid: $DISPATCH_VERSION" >&2
              exit 1
            }
            version="$DISPATCH_VERSION"
            tag="v$version"
          else
            tag="${{ github.ref_name }}"
            version="${tag#v}"
          fi
          python3 scripts/version_tool.py check --tag "$tag"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          if [[ "$version" =~ -(alpha|beta|rc)\.[0-9]+$ ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "npm-tag=next" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "npm-tag=latest" >> "$GITHUB_OUTPUT"
          fi

  native-unix:
    needs: preflight
    if: github.event_name == 'workflow_dispatch'
    name: native-${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            name: linux-x64
          - os: ubuntu-24.04-arm
            name: linux-arm64
          - os: macos-14
            name: macos-arm64
          - os: macos-15-intel
            name: macos-x64
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ninja-build libomp-dev liblapacke-dev libopenblas-dev libssl-dev pkg-config

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: brew install libomp openssl@3 pkg-config

      - name: Configure portable release
        run: >-
          cmake -S . -B build-release -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DQSIM_BUILD_EXAMPLES=OFF
          -DQSIM_BUILD_BENCHMARKS=OFF
          -DQSIM_NATIVE_ARCH=OFF
          -DQSIM_FAST_MATH=OFF
          -DQSIM_WERROR=ON

      - name: Build and test
        run: |
          cmake --build build-release --parallel 2
          ctest --test-dir build-release --output-on-failure --timeout 180 -L "(core|abi|topology|health)" -LE "long|memory_heavy" --parallel 2

      - name: Package and verify external consumer
        run: |
          scripts/package_release_artifact.sh \
            --build-dir build-release \
            --output moonlab-${{ needs.preflight.outputs.tag }}-${{ matrix.name }}.tar.gz
          scripts/verify_release_package.sh \
            --package moonlab-${{ needs.preflight.outputs.tag }}-${{ matrix.name }}.tar.gz

      - uses: actions/upload-artifact@v7
        with:
          name: native-${{ matrix.name }}
          path: moonlab-${{ needs.preflight.outputs.tag }}-${{ matrix.name }}.tar.gz
          if-no-files-found: error
          retention-days: 7

  native-windows:
    needs: preflight
    if: github.event_name == 'workflow_dispatch'
    name: native-${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: windows-x64
            arch: x64
          - os: windows-11-arm
            name: windows-arm64
            arch: arm64
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Build, test, package, and verify
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          .\scripts\build_windows_artifact.ps1 `
            -Arch '${{ matrix.arch }}' `
            -BuildDir 'build-windows-${{ matrix.arch }}' `
            -Output '${{ runner.temp }}\moonlab-${{ needs.preflight.outputs.tag }}-${{ matrix.name }}.zip'

      - uses: actions/upload-artifact@v7
        with:
          name: native-${{ matrix.name }}
          path: ${{ runner.temp }}\moonlab-${{ needs.preflight.outputs.tag }}-${{ matrix.name }}.zip
          if-no-files-found: error
          retention-days: 7

  debian:
    needs: preflight
    if: github.event_name == 'workflow_dispatch'
    name: debian-${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            arch: amd64
          - os: ubuntu-24.04-arm
            arch: arm64
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build libomp-dev libopenblas-dev liblapacke-dev libssl-dev dpkg-dev pkg-config

      - name: Build and verify Debian package
        run: |
          scripts/build-deb.sh "${{ needs.preflight.outputs.version }}"
          dpkg-deb --info moonlab_${{ needs.preflight.outputs.version }}_${{ matrix.arch }}.deb
          scripts/verify_deb_package.sh --package moonlab_${{ needs.preflight.outputs.version }}_${{ matrix.arch }}.deb

      - uses: actions/upload-artifact@v7
        with:
          name: debian-${{ matrix.arch }}
          path: moonlab_${{ needs.preflight.outputs.version }}_${{ matrix.arch }}.deb
          if-no-files-found: error
          retention-days: 7

  python-wheels:
    needs: preflight
    if: github.event_name == 'workflow_dispatch'
    name: wheel-${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            name: linux-x64
            arch: x86_64
            macos-target: ""
          - os: ubuntu-24.04-arm
            name: linux-arm64
            arch: aarch64
            macos-target: ""
          - os: macos-14
            name: macos-arm64
            arch: arm64
            macos-target: "11.0"
          - os: macos-15-intel
            name: macos-x64
            arch: x86_64
            macos-target: "10.15"
          - os: windows-latest
            name: windows-x64
            arch: AMD64
            macos-target: ""
          - os: windows-11-arm
            name: windows-arm64
            arch: ARM64
            macos-target: ""
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install wheel builder
        run: python -m pip install "cibuildwheel==4.1.0"

      - name: Build, repair, and test wheel
        env:
          CIBW_BUILD: cp311-*
          CIBW_ARCHS: ${{ matrix.arch }}
          MACOSX_DEPLOYMENT_TARGET: ${{ matrix.macos-target }}
          # cibuildwheel's default build frontend retains pip in the per-ABI
          # environment, which the Windows Ninja bootstrap below requires.
          CIBW_BUILD_FRONTEND: build
          CIBW_MANYLINUX_X86_64_IMAGE: manylinux_2_28
          CIBW_MANYLINUX_AARCH64_IMAGE: manylinux_2_28
          CIBW_BEFORE_ALL_LINUX: dnf install -y openblas-devel lapack-devel
          CIBW_BEFORE_BUILD_WINDOWS: python -m pip install ninja
          CIBW_ENVIRONMENT_WINDOWS: CC=clang-cl CXX=clang-cl CMAKE_GENERATOR=Ninja
          CIBW_TEST_REQUIRES: numpy
          CIBW_TEST_COMMAND: >-
            python -c "import moonlab; from importlib import metadata; from moonlab import QuantumState; from moonlab.crypto import mlkem;
            q=QuantumState(2); q.h(0); q.cnot(0,1); pk,sk=mlkem.keygen_qrng(); s=mlkem.qrng_status();
            files=[str(p) for p in metadata.files('moonlab')];
            assert len(pk)==800 and len(sk)==1632 and s['continuous_health_tests'] and s['shake256_conditioned'] and s['bell_epoch_certified'];
            assert any(p.startswith('moonlab/.libs/') for p in files);
            assert not any(p.startswith(('include/','lib/cmake/','lib/pkgconfig/')) for p in files)"
        run: python -m cibuildwheel bindings/python --output-dir wheelhouse

      - uses: actions/upload-artifact@v7
        with:
          name: python-${{ matrix.name }}
          path: wheelhouse/*.whl
          if-no-files-found: error
          retention-days: 7

  npm-packages:
    needs: preflight
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          package-manager-cache: false

      - uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - uses: mymindstorm/setup-emsdk@v14
        with:
          version: 4.0.22

      - name: Build WASM BLAS
        run: bindings/javascript/packages/core/emscripten/build-clapack-wasm.sh

      - name: Install, build, and test workspace
        working-directory: bindings/javascript
        run: |
          pnpm install --frozen-lockfile
          pnpm run build
          # `pnpm test` (turbo) only reaches each package's WASM-free
          # vitest unit config; the core integration suite
          # (vitest.integration.config.ts) is what exercises the
          # moonlab.wasm module this job just built and is about to
          # publish, so run it explicitly as well.
          pnpm test
          pnpm run test:integration

      - name: Pack and verify exact npm artifacts
        run: |
          scripts/package_npm.sh "$RUNNER_TEMP/npm"
          node scripts/verify_npm_packages.mjs "$RUNNER_TEMP/npm"

      - uses: actions/upload-artifact@v7
        with:
          name: npm-packages
          path: ${{ runner.temp }}/npm/*.tgz
          if-no-files-found: error
          retention-days: 7

  rust-crates:
    needs: [preflight, native-unix]
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/download-artifact@v7
        with:
          name: native-linux-x64
          path: native

      - name: Install Rust and native runtime dependencies
        run: |
          rustup toolchain install 1.86.0 --profile minimal
          rustup default 1.86.0
          sudo apt-get update
          sudo apt-get install -y libclang-dev libomp-dev libopenblas-dev liblapacke-dev libssl-dev pkg-config

      - name: Extract the tested native SDK
        shell: bash
        run: |
          mkdir -p "$RUNNER_TEMP/moonlab-sdk"
          tar -xzf "native/moonlab-${{ needs.preflight.outputs.tag }}-linux-x64.tar.gz" \
            -C "$RUNNER_TEMP/moonlab-sdk"

      - name: Test Rust bindings and publication metadata
        env:
          PKG_CONFIG_PATH: ${{ runner.temp }}/moonlab-sdk/lib/pkgconfig
          LD_LIBRARY_PATH: ${{ runner.temp }}/moonlab-sdk/lib
        shell: bash
        run: |
          cargo test --manifest-path bindings/rust/moonlab/Cargo.toml
          cargo check --manifest-path bindings/rust/moonlab-tui/Cargo.toml
          cargo publish --manifest-path bindings/rust/moonlab-sys/Cargo.toml --dry-run
          cargo package --manifest-path bindings/rust/moonlab/Cargo.toml --no-verify
          cargo package --manifest-path bindings/rust/moonlab-tui/Cargo.toml --no-verify

      - name: Collect exact prebuilt crate payloads
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/crates"
          cp bindings/rust/moonlab-sys/target/package/moonlab-sys-${{ needs.preflight.outputs.version }}.crate "$RUNNER_TEMP/crates/"
          cp bindings/rust/moonlab/target/package/moonlab-${{ needs.preflight.outputs.version }}.crate "$RUNNER_TEMP/crates/"
          cp bindings/rust/moonlab-tui/target/package/moonlab-tui-${{ needs.preflight.outputs.version }}.crate "$RUNNER_TEMP/crates/"

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Seal and certify exact-byte crate uploadability
        shell: bash
        run: |
          set -euo pipefail
          cd "$RUNNER_TEMP/crates"
          # Seal the packaged .crate bytes with a SHA256SUMS manifest, then
          # prove each one uploads verbatim through the exact-byte publisher
          # before the tag is cut. The SHA256SUMS stays in the work directory so
          # the uploaded artifact carries only the .crate files that candidate-seal
          # hashes into the immutable release manifest; publish-rust re-verifies
          # these same bytes against that promoted manifest and ships them raw.
          sha256sum -- *.crate > SHA256SUMS
          echo "Certified Rust crate bytes:"
          cat SHA256SUMS
          for crate in moonlab-sys moonlab moonlab-tui; do
            artifact="${crate}-${{ needs.preflight.outputs.version }}.crate"
            sha="$(awk -v f="$artifact" '$2 == f {print $1}' SHA256SUMS)"
            test -n "$sha"
            python3 "$GITHUB_WORKSPACE/scripts/publish_crate_exact_bytes.py" publish \
              --crate "$artifact" --sha256 "$sha" --dry-run
          done

      - uses: actions/upload-artifact@v7
        with:
          name: rust-crates
          path: ${{ runner.temp }}/crates/*.crate
          if-no-files-found: error
          retention-days: 7

  linux-compatibility:
    needs: preflight
    if: github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/linux-compatibility.yml

  candidate-seal:
    if: github.event_name == 'workflow_dispatch'
    needs: [preflight, native-unix, native-windows, debian, python-wheels, npm-packages, rust-crates, linux-compatibility]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/download-artifact@v7
        with:
          pattern: native-*
          path: candidate/dist
          merge-multiple: true

      - uses: actions/download-artifact@v7
        with:
          pattern: debian-*
          path: candidate/dist
          merge-multiple: true

      - uses: actions/download-artifact@v7
        with:
          pattern: python-*
          path: candidate/dist
          merge-multiple: true

      - uses: actions/download-artifact@v7
        with:
          name: npm-packages
          path: candidate/dist

      - uses: actions/download-artifact@v7
        with:
          name: rust-crates
          path: candidate/dist

      - name: Seal exact 22-artifact candidate inventory
        run: >-
          python3 scripts/verify_release_candidate.py seal
          --dist candidate/dist
          --output candidate/moonlab-release-candidate.json
          --run-id '${{ github.run_id }}'
          --head '${{ github.sha }}'
          --version '${{ needs.preflight.outputs.version }}'

      - uses: actions/upload-artifact@v7
        with:
          name: release-candidate-manifest
          path: candidate/moonlab-release-candidate.json
          if-no-files-found: error
          retention-days: 7

  promotion-verify:
    if: github.event_name == 'push'
    needs: preflight
    runs-on: ubuntu-22.04
    permissions:
      actions: read
      contents: read
    outputs:
      candidate-run-id: ${{ steps.candidate.outputs.run-id }}
      candidate-head: ${{ steps.candidate.outputs.head }}
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Resolve the exact candidate from the annotated tag
        id: candidate
        shell: bash
        run: |
          set -euo pipefail
          python3 - "${{ needs.preflight.outputs.tag }}" "$GITHUB_OUTPUT" <<'PY'
          from pathlib import Path
          import sys

          sys.path.insert(0, str(Path.cwd() / "scripts"))
          from validate_release_certificate import _tag_candidate_binding

          run_id, head = _tag_candidate_binding(Path.cwd(), sys.argv[1])
          with Path(sys.argv[2]).open("a", encoding="utf-8") as output:
              output.write(f"run-id={run_id}\nhead={head}\n")
          PY
          [[ "$(git rev-parse HEAD)" == "$(git rev-parse '${{ github.sha }}')" ]]

      - name: Query and validate immutable hosted run identity and complete jobs
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p promotion
          gh run view '${{ steps.candidate.outputs.run-id }}' \
            --repo '${{ github.repository }}' \
            --json databaseId,url,headSha,conclusion,event,workflowName,jobs \
            | jq '{databaseId,url,headSha,conclusion,event,workflowName,jobs:[.jobs[]|{name,conclusion}]}' \
            > promotion/candidate-run.json
          python3 scripts/verify_release_candidate.py verify-run \
            --run-json promotion/candidate-run.json \
            --run-id '${{ steps.candidate.outputs.run-id }}' \
            --head '${{ github.sha }}'
          [[ '${{ steps.candidate.outputs.head }}' == '${{ github.sha }}' ]]

      - name: Download only artifacts from the tag-bound candidate run
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p promotion/dist promotion/manifest
          for artifact in \
            native-linux-x64 native-linux-arm64 native-macos-arm64 native-macos-x64 \
            native-windows-x64 native-windows-arm64 debian-amd64 debian-arm64 \
            python-linux-x64 python-linux-arm64 python-macos-arm64 python-macos-x64 \
            python-windows-x64 python-windows-arm64 npm-packages rust-crates; do
            gh run download '${{ steps.candidate.outputs.run-id }}' \
              --repo '${{ github.repository }}' --name "$artifact" --dir promotion/dist
          done
          gh run download '${{ steps.candidate.outputs.run-id }}' \
            --repo '${{ github.repository }}' --name release-candidate-manifest \
            --dir promotion/manifest

      - name: Require exact byte-for-byte candidate reuse
        run: >-
          python3 scripts/verify_release_candidate.py verify
          --dist promotion/dist
          --manifest promotion/manifest/moonlab-release-candidate.json
          --run-id '${{ steps.candidate.outputs.run-id }}'
          --head '${{ github.sha }}'
          --version '${{ needs.preflight.outputs.version }}'

      - uses: actions/upload-artifact@v7
        with:
          name: promoted-release-artifacts
          path: promotion/dist/**
          if-no-files-found: error
          retention-days: 7

      - uses: actions/upload-artifact@v7
        with:
          name: promoted-release-manifest
          path: promotion/manifest/moonlab-release-candidate.json
          if-no-files-found: error
          retention-days: 7

  publication-readiness:
    if: github.event_name == 'push'
    needs: [preflight, promotion-verify]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Require the audited exact-byte crate uploader before any registry mutation
        shell: bash
        run: |
          set -euo pipefail
          publisher=scripts/publish_crate_exact_bytes.py
          # cargo publish always repackages from the checkout and has no
          # supported prebuilt .crate input, so an audited exact-byte crates.io
          # uploader must exist before PyPI, npm, crates.io, Homebrew, or the
          # GitHub release may be mutated. Fail closed when it is missing.
          if [[ ! -f "$publisher" ]]; then
            echo "BLOCKED: no audited exact-byte crates.io uploader; cargo publish has no supported prebuilt .crate input." >&2
            exit 1
          fi
          if ! grep -q 'api/v1/crates/new' "$publisher"; then
            echo "BLOCKED: $publisher is not the exact-byte crates.io uploader." >&2
            exit 1
          fi
          echo "exact-byte crate uploader present: $publisher"

  publication-credentials:
    if: github.event_name == 'push'
    needs: [preflight, publication-readiness]
    runs-on: ubuntu-22.04
    steps:
      - name: Require publication credentials only after exact-byte readiness
        env:
          PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        shell: bash
        run: |
          test -n "$PYPI_API_TOKEN" || { echo "PYPI_API_TOKEN is required" >&2; exit 1; }
          test -n "$NPM_TOKEN" || { echo "NPM_TOKEN is required" >&2; exit 1; }
          test -n "$CARGO_REGISTRY_TOKEN" || { echo "CARGO_REGISTRY_TOKEN is required" >&2; exit 1; }
          if [[ "${{ needs.preflight.outputs.prerelease }}" == "false" ]]; then
            test -n "$HOMEBREW_TAP_TOKEN" || { echo "HOMEBREW_TAP_TOKEN is required for stable releases" >&2; exit 1; }
          fi

  draft-release:
    if: github.event_name == 'push'
    needs: [preflight, promotion-verify, publication-readiness, publication-credentials]
    runs-on: ubuntu-22.04
    permissions:
      actions: read
      contents: write
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: promoted-release-artifacts
          path: dist

      - name: Generate checksums
        working-directory: dist
        run: shasum -a 256 -- * > SHA256SUMS

      - name: Create fully populated draft release
        uses: softprops/action-gh-release@v3
        with:
          name: Moonlab ${{ github.ref_name }}
          draft: true
          prerelease: ${{ needs.preflight.outputs.prerelease == 'true' }}
          fail_on_unmatched_files: true
          files: dist/*
          body: |
            See CHANGELOG.md and the release notes in `docs/release/` for details.

            Install after this draft has passed registry publication:

            ```bash
            brew tap tsotchke/moonlab
            brew install moonlab
            pip install moonlab
            npm install @moonlab/quantum-core
            cargo install moonlab-tui
            ```

            Native archives cover Linux, macOS, and Windows on x64 and ARM64.
            `SHA256SUMS` authenticates every attached release artifact.

  publish-python:
    needs: [preflight, promotion-verify, draft-release]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/download-artifact@v7
        with:
          name: promoted-release-artifacts
          path: dist

      - uses: actions/download-artifact@v7
        with:
          name: promoted-release-manifest
          path: manifest

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Validate and publish wheels
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          python3 scripts/verify_release_candidate.py verify \
            --dist dist \
            --manifest manifest/moonlab-release-candidate.json \
            --run-id '${{ needs.promotion-verify.outputs.candidate-run-id }}' \
            --head '${{ needs.promotion-verify.outputs.candidate-head }}' \
            --version '${{ needs.preflight.outputs.version }}'
          python -m pip install twine
          python -m twine check dist/*.whl
          python -m twine upload --non-interactive dist/*.whl

  publish-npm:
    needs: [preflight, promotion-verify, draft-release]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/download-artifact@v7
        with:
          name: promoted-release-artifacts
          path: dist

      - uses: actions/download-artifact@v7
        with:
          name: promoted-release-manifest
          path: manifest

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Publish exact tested tarballs
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TAG: ${{ needs.preflight.outputs.npm-tag }}
          VERSION: ${{ needs.preflight.outputs.version }}
        shell: bash
        run: |
          python3 scripts/verify_release_candidate.py verify \
            --dist dist \
            --manifest manifest/moonlab-release-candidate.json \
            --run-id '${{ needs.promotion-verify.outputs.candidate-run-id }}' \
            --head '${{ needs.promotion-verify.outputs.candidate-head }}' \
            --version '${{ needs.preflight.outputs.version }}'
          for package in core algorithms viz react vue; do
            artifact="dist/moonlab-quantum-${package}-${VERSION}.tgz"
            test -f "$artifact"
            npm publish "$artifact" --tag "$NPM_TAG" --access public --provenance
          done

  publish-rust:
    needs: [preflight, promotion-verify, draft-release]
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/download-artifact@v7
        with:
          name: promoted-release-artifacts
          path: dist

      - uses: actions/download-artifact@v7
        with:
          name: promoted-release-manifest
          path: manifest

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install cargo for crates.io index polling
        run: |
          rustup toolchain install 1.86.0 --profile minimal
          rustup default 1.86.0

      - name: Publish the certified crate bytes in dependency order
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          VERSION: ${{ needs.preflight.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          # Re-assert exact byte-for-byte identity of every promoted artifact,
          # including the three .crate tarballs, against the immutable candidate
          # manifest before touching crates.io. Fails closed on any drift.
          python3 scripts/verify_release_candidate.py verify \
            --dist dist \
            --manifest manifest/moonlab-release-candidate.json \
            --run-id '${{ needs.promotion-verify.outputs.candidate-run-id }}' \
            --head '${{ needs.promotion-verify.outputs.candidate-head }}' \
            --version "$VERSION"

          wait_for_crate() {
            local crate="$1"
            for attempt in {1..30}; do
              if cargo info "${crate}@${VERSION}" >/dev/null 2>&1; then
                return 0
              fi
              echo "waiting for crates.io index: ${crate} ${VERSION} (attempt ${attempt}/30)"
              sleep 10
            done
            echo "crates.io did not index ${crate} ${VERSION} in time" >&2
            return 1
          }

          # Ship the exact certified bytes. publish_crate_exact_bytes.py uploads
          # the .crate tarball verbatim through PUT /api/v1/crates/new and refuses
          # to send unless the bytes re-hash to the certified SHA-256 taken from
          # the promoted manifest. Nothing is re-packaged, so the published
          # tarball hash equals the release certificate.
          publish_exact() {
            local crate="$1"
            local artifact="dist/${crate}-${VERSION}.crate"
            test -f "$artifact"
            local sha
            sha="$(jq -er --arg f "${crate}-${VERSION}.crate" \
              '.artifacts[] | select(.filename == $f) | .sha256' \
              manifest/moonlab-release-candidate.json)"
            test -n "$sha"
            python3 scripts/publish_crate_exact_bytes.py publish \
              --crate "$artifact" --sha256 "$sha"
          }

          publish_exact moonlab-sys
          wait_for_crate moonlab-sys
          publish_exact moonlab
          wait_for_crate moonlab
          publish_exact moonlab-tui

  update-homebrew:
    needs: [preflight, draft-release, publish-python, publish-npm, publish-rust]
    if: needs.preflight.outputs.prerelease == 'false'
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Materialize stable formula
        env:
          VERSION: ${{ needs.preflight.outputs.version }}
          TAG: ${{ github.ref_name }}
        shell: bash
        run: |
          source_url="https://github.com/tsotchke/moonlab/archive/refs/tags/${TAG}.tar.gz"
          sha256="$(curl -fsSL "$source_url" | shasum -a 256 | cut -d ' ' -f 1)"
          sed -i '' -E "s|url \".*\"|url \"${source_url}\"|" packaging/homebrew/moonlab.rb
          sed -i '' -E "s|sha256 \".*\"|sha256 \"${sha256}\"|" packaging/homebrew/moonlab.rb
          grep -F "url \"${source_url}\"" packaging/homebrew/moonlab.rb
          grep -F "sha256 \"${sha256}\"" packaging/homebrew/moonlab.rb

      - name: Prepare tap checkout
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          gh auth setup-git
          gh repo clone tsotchke/homebrew-moonlab tap
          mkdir -p tap/Formula
          cp packaging/homebrew/moonlab.rb tap/Formula/moonlab.rb

      - name: Audit and install formula from source
        run: |
          brew tap tsotchke/moonlab "$PWD/tap"
          brew audit --formula --strict tsotchke/moonlab/moonlab
          brew install --build-from-source tsotchke/moonlab/moonlab
          brew test tsotchke/moonlab/moonlab

      - name: Push formula to tap
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          git -C tap config user.name "Moonlab Release Bot"
          git -C tap config user.email "actions@github.com"
          git -C tap add Formula/moonlab.rb
          git -C tap diff --cached --check
          git -C tap commit -m "moonlab ${{ github.ref_name }}"
          git -C tap push origin HEAD:main

  finalize-release:
    needs: [preflight, draft-release, publish-python, publish-npm, publish-rust, update-homebrew]
    if: >-
      always() &&
      needs.draft-release.result == 'success' &&
      needs.publish-python.result == 'success' &&
      needs.publish-npm.result == 'success' &&
      needs.publish-rust.result == 'success' &&
      (needs.update-homebrew.result == 'success' || needs.update-homebrew.result == 'skipped')
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Publish GitHub release only after every registry succeeds
        shell: bash
        run: |
          if [[ "${{ needs.preflight.outputs.prerelease }}" == "true" ]]; then
            gh release edit "${{ github.ref_name }}" --repo "${{ github.repository }}" --draft=false --prerelease
          else
            gh release edit "${{ github.ref_name }}" --repo "${{ github.repository }}" --draft=false --latest
          fi
