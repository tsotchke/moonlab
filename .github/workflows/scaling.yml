name: scaling

# SCALING / large-n cross-backend differential (tests/scaling).
# Pushes scale + circuit diversity to hunt scale-dependent divergences across
# dense / tn_mps / Clifford / MPS-var-D / DMRG / TDVP. Known divergences (the tn
# adjacent 2q-gate normalization envelope and the imaginary-time TDVP interior-
# site plateau) are quarantined in tests/scaling/KNOWN_DIVERGENCES.txt and
# excluded from the gate; any NEW (non-quarantined) divergence fails the job.
#
# POSIX-only, Linux nightly / on-demand. Like the other deep adversarial suites
# (differential, statistical), this is NOT a per-push gate and never runs on
# Windows: run_scaling.sh is a POSIX shell driver and the corpus generator and
# drivers assume a POSIX toolchain. The main CI workflow and the ICC readiness
# gate provide per-push coverage; running this on every src/** push only created
# red noise. Fold back into PR triggers once the suite is proven green in nightly.

on:
  schedule:
    - cron: '0 5 * * *'   # nightly full profile
  workflow_dispatch:
    inputs:
      profile:
        description: 'scaling profile (quick|full)'
        required: false
        default: 'quick'

permissions:
  contents: read

concurrency:
  group: scaling-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scaling:
    # POSIX only -- Linux runner, mirrors the differential / statistical suites.
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build build-essential python3 python3-numpy \
            libopenblas-dev liblapacke-dev

      - name: Build libquantumsim
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build -j2

      - name: Select profile
        id: prof
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "profile=full" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ github.event.inputs.profile }}" ]; then
            echo "profile=${{ github.event.inputs.profile }}" >> "$GITHUB_OUTPUT"
          else
            echo "profile=quick" >> "$GITHUB_OUTPUT"
          fi

      - name: Run scaling differential
        env:
          MOONLAB_LIB_DIR: ${{ github.workspace }}/build
        run: bash scripts/run_scaling.sh --profile ${{ steps.prof.outputs.profile }}

      - name: Upload JSONL trace
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: moonlab-scaling-trace-${{ steps.prof.outputs.profile }}
          path: scripts/icc_traces/moonlab_scaling.jsonl
          if-no-files-found: ignore
