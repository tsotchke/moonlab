name: Linux compatibility

on:
  workflow_call:
  workflow_dispatch:
  push:
    branches: [master, develop, 'feat/**', 'chore/**', 'feature/**']
    paths:
      - '.github/workflows/linux-compatibility.yml'
      - 'CMakeLists.txt'
      - 'cmake/**'
      - 'include/**'
      - 'src/**'
      - 'tests/**'
      - 'scripts/build-linux.sh'
      - 'scripts/build_linux_portability_lane.sh'
      - 'scripts/run_linux_portability_lane.py'
      - 'scripts/moonlab_linux_portability.py'
      - 'scripts/package_release_artifact.sh'
      - 'scripts/verify_release_package.sh'
      - 'release/**'
  pull_request:
    branches: [master]
    paths:
      - '.github/workflows/linux-compatibility.yml'
      - 'CMakeLists.txt'
      - 'cmake/**'
      - 'include/**'
      - 'src/**'
      - 'tests/**'
      - 'scripts/build-linux.sh'
      - 'scripts/build_linux_portability_lane.sh'
      - 'scripts/run_linux_portability_lane.py'
      - 'scripts/moonlab_linux_portability.py'
      - 'scripts/package_release_artifact.sh'
      - 'scripts/verify_release_package.sh'
      - 'release/**'

permissions:
  contents: read

jobs:
  evidence-contract:
    name: linux-portability-evidence-contract
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Test fail-closed portability evidence validation
        run: python3 tests/release/test_moonlab_linux_portability.py

  linux-matrix:
    needs: evidence-contract
    name: linux-${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        include:
          - name: debian-12-amd64
            runner: ubuntu-22.04
            image: debian:12-slim
            evidence: true
          - name: debian-12-arm64
            runner: ubuntu-24.04-arm
            image: debian:12-slim
            evidence: true
          - name: debian-13-amd64
            runner: ubuntu-22.04
            image: debian:13-slim
            evidence: true
          - name: debian-13-arm64
            runner: ubuntu-24.04-arm
            image: debian:13-slim
            evidence: true
          - name: ubuntu-22.04-amd64
            runner: ubuntu-22.04
            image: ubuntu:22.04
            evidence: true
          - name: ubuntu-22.04-arm64
            runner: ubuntu-24.04-arm
            image: ubuntu:22.04
            evidence: true
          - name: ubuntu-24.04-amd64
            runner: ubuntu-22.04
            image: ubuntu:24.04
            evidence: true
          - name: ubuntu-24.04-arm64
            runner: ubuntu-24.04-arm
            image: ubuntu:24.04
            evidence: true
          - name: ubuntu-26.04-amd64
            runner: ubuntu-22.04
            image: ubuntu:26.04
            evidence: true
          - name: ubuntu-26.04-arm64
            runner: ubuntu-24.04-arm
            image: ubuntu:26.04
            evidence: true
          - name: almalinux-8
            runner: ubuntu-22.04
            image: almalinux:8
            evidence: false
          - name: almalinux-9
            runner: ubuntu-22.04
            image: almalinux:9
            evidence: false
          - name: almalinux-10
            runner: ubuntu-22.04
            image: almalinux:10
            evidence: false
          - name: fedora-current
            runner: ubuntu-22.04
            image: fedora:latest
            evidence: false
          - name: arch-current
            runner: ubuntu-22.04
            image: archlinux:base
            evidence: false
          - name: opensuse-current
            runner: ubuntu-22.04
            image: opensuse/tumbleweed
            evidence: false
          - name: alpine-current
            runner: ubuntu-22.04
            image: alpine:latest
            evidence: false

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Build canonical lane and bind release evidence
        if: matrix.evidence
        shell: bash
        run: |
          set -euxo pipefail
          python3 scripts/run_linux_portability_lane.py \
            --profile '${{ matrix.name }}' \
            --output "$RUNNER_TEMP/linux-portability-${{ matrix.name }}" \
            --jobs 2
          tar -czf "$RUNNER_TEMP/moonlab-linux-portability-lane-${{ matrix.name }}.tar.gz" \
            -C "$RUNNER_TEMP/linux-portability-${{ matrix.name }}" .

      - name: Build additional distribution-family smoke
        if: matrix.evidence == false
        env:
          DISTRO_IMAGE: ${{ matrix.image }}
        shell: bash
        run: |
          set -euxo pipefail
          docker pull "$DISTRO_IMAGE"
          docker run --rm \
            --volume "$PWD:/src:ro" \
            --workdir /src \
             "$DISTRO_IMAGE" \
             /bin/sh -c 'if ! command -v bash >/dev/null 2>&1; then apk add --no-cache bash ca-certificates; fi; exec bash scripts/build-linux.sh --build-dir /tmp/moonlab-build --jobs 2 --ctest --verify-package'

      - uses: actions/upload-artifact@v7
        if: matrix.evidence
        with:
          name: linux-portability-lane-${{ matrix.name }}
          path: ${{ runner.temp }}/moonlab-linux-portability-lane-${{ matrix.name }}.tar.gz
          if-no-files-found: error
          retention-days: 7

  portability-aggregate:
    needs: linux-matrix
    name: linux-portability-aggregate
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/download-artifact@v7
        with:
          pattern: linux-portability-lane-*
          path: ${{ runner.temp }}/linux-portability-bundles
          merge-multiple: true

      - name: Require and aggregate the exact canonical profile set
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          bundles=("$RUNNER_TEMP"/linux-portability-bundles/moonlab-linux-portability-lane-*.tar.gz)
          [[ "${#bundles[@]}" -eq 10 ]] || {
            echo "expected exactly ten portability lane bundles, found ${#bundles[@]}" >&2
            exit 1
          }
          lane_arguments=()
          for bundle in "${bundles[@]}"; do
            profile="${bundle##*/moonlab-linux-portability-lane-}"
            profile="${profile%.tar.gz}"
            lane_dir="$RUNNER_TEMP/linux-portability-lanes/$profile"
            mkdir -p "$lane_dir"
            tar -xzf "$bundle" -C "$lane_dir"
            manifest="$lane_dir/lane-$profile.json"
            [[ -f "$manifest" ]] || { echo "missing lane manifest for $profile" >&2; exit 1; }
            lane_arguments+=(--lane "$manifest")
          done
          python3 scripts/moonlab_linux_portability.py \
            --profiles release/linux_portability_profiles.v1.json \
            "${lane_arguments[@]}" \
            --out "$RUNNER_TEMP/moonlab-linux-portability-aggregate.json"

      - uses: actions/upload-artifact@v7
        with:
          name: linux-portability-aggregate
          path: ${{ runner.temp }}/moonlab-linux-portability-aggregate.json
          if-no-files-found: error
          retention-days: 7
