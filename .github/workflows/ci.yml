name: CI

on:
  push:
    branches: [master, develop, 'feat/**', 'chore/**', 'feature/**']
  pull_request:
    branches: [master]

concurrency:
  # New pushes cancel older in-flight runs in the same group.  We
  # want fast feedback over "complete signal on every commit" -- the
  # latest commit always supersedes.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Pinned tool versions.  Bumped together so a single PR rolls every
# lane forward; do NOT pin selectively without an audit pass.
env:
  CMAKE_VERSION: '3.27.9'
  NINJA_VERSION: '1.11.1'
  PYTHON_VERSION: '3.11'
  RUST_TOOLCHAIN: '1.86.0'
  EMSCRIPTEN_VERSION: '3.1.74'
  # MOONLAB_SKIP_HW_ENTROPY=1 prevents the hardware-entropy probe from
  # blocking on the absent /dev/hwrng / RDRAND-equivalent on hosted
  # runners.  Affects bindings + WASM lanes only.
  MOONLAB_SKIP_HW_ENTROPY: '1'

jobs:
  # ============================================================================
  # unix-matrix — every Linux/macOS configuration we ship for, in one
  # matrix.  Modelled on Eshkol's CI: one job, matrix.include, every lane
  # named identically to its purpose (arch + feature).  Adding a new
  # configuration is a matrix row, not a new job block.
  # ============================================================================

  unix-matrix:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64-lite
            runner: ubuntu-22.04
            cmake_flags: ''
            test_label: ''
          - name: linux-x64-mpi
            runner: ubuntu-22.04
            cmake_flags: '-DQSIM_ENABLE_MPI=ON'
            test_label: ''
          - name: linux-x64-asan
            runner: ubuntu-22.04
            cmake_flags: '-DQSIM_ENABLE_SANITIZERS=ON -DCMAKE_BUILD_TYPE=Debug'
            test_label: 'core'
          # linux-arm64 lane is exercised on the self-hosted Jetson
          # runner via .github/workflows/ci-jetson.yml; not duplicated
          # here because ubuntu-22.04-arm hosted runners cost double
          # the per-minute rate of ubuntu-22.04.
          - name: macos-arm64-lite
            runner: macos-14
            cmake_flags: ''
            test_label: ''
          - name: macos-arm64-mpi
            runner: macos-14
            cmake_flags: '-DQSIM_ENABLE_MPI=ON'
            test_label: ''
          # macos-x64-lite removed: hosted macos-13 runner queue depth is
          # ~hours on free tier, and Apple has deprecated x86-Mac.  x86
          # ABI coverage is exercised by linux-x64-lite and Docker; add
          # a self-hosted Intel Mac runner if x86-Mac-specific coverage
          # becomes load-bearing.

    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update -o Acquire::Retries=5
          PKGS="build-essential ninja-build libomp-dev libopenblas-dev liblapacke-dev pkg-config python3-dev python3-pip"
          if [[ "${{ matrix.cmake_flags }}" == *"QSIM_ENABLE_MPI=ON"* ]]; then
              PKGS="$PKGS libopenmpi-dev openmpi-bin"
          fi
          sudo apt-get install -y $PKGS

      - name: Install Dependencies (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euxo pipefail
          brew install ninja libomp openblas pkg-config
          if [[ "${{ matrix.cmake_flags }}" == *"QSIM_ENABLE_MPI=ON"* ]]; then
              brew install open-mpi
          fi

      - name: Pin CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: ${{ env.CMAKE_VERSION }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python deps
        shell: bash
        run: pip install numpy pytest

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Configure
        shell: bash
        run: |
          set -euxo pipefail
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DQSIM_WERROR=ON \
            ${{ matrix.cmake_flags }}

      - name: Build
        shell: bash
        run: |
          set -euxo pipefail
          if [[ "${{ matrix.cmake_flags }}" == *"QSIM_ENABLE_SANITIZERS=ON"* ]]; then
              export ASAN_OPTIONS="detect_leaks=0:halt_on_error=1:allocator_may_return_null=1"
              export UBSAN_OPTIONS="halt_on_error=1:print_stacktrace=1"
          fi
          cmake --build build --parallel

      - name: Test
        timeout-minutes: 30
        shell: bash
        env:
          OMPI_MCA_plm_ssh_agent: /bin/false
          OMPI_ALLOW_RUN_AS_ROOT: 1
          OMPI_ALLOW_RUN_AS_ROOT_CONFIRM: 1
        run: |
          set -euxo pipefail
          if [[ "${{ matrix.cmake_flags }}" == *"QSIM_ENABLE_SANITIZERS=ON"* ]]; then
              export ASAN_OPTIONS="detect_leaks=0:halt_on_error=1:allocator_may_return_null=1"
              export UBSAN_OPTIONS="halt_on_error=1:print_stacktrace=1"
          fi
          TEST_FILTER=""
          if [[ -n "${{ matrix.test_label }}" ]]; then
              TEST_FILTER="-L ${{ matrix.test_label }}"
          fi
          # Exclude long-running tests to keep total runtime bounded.
          # Lanes that need the heavy suite live in the nightly workflow.
          #
          # -LE: label-exclude.  Tests carrying the "long" or
          # "memory_heavy" labels (quantum_sim_test, unit_kagome_ed_large,
          # unit_qrng_statistics, unit_libirrep_sector_ed) burn 200-300s
          # each and tip the run over its 30 min timeout when stacked
          # behind a slow ubuntu-22.04 shared runner.
          # -E: also name-exclude a few specific large tests that aren't
          # in those labels (state-vector sharding at n=34, hofstadter
          # full sweep, kagome ED at n=18).
          # --timeout 600: individual test ceiling -- generous enough
          # that unit_qrng_statistics doesn't false-positive a
          # near-timeout pass when the runner is loaded.
          ctest --test-dir build --output-on-failure --timeout 600 \
              -LE "long|memory_heavy" \
              -E "n34_to_n40|hofstadter_sweep|kagome_ed_n18" \
              $TEST_FILTER -j 4

      - name: Upload Build Log on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}-build-log
          path: |
            build/CMakeFiles/CMakeError.log
            build/CMakeFiles/CMakeOutput.log
          if-no-files-found: ignore

  # ============================================================================
  # windows-matrix — native ClangCL builds for both Windows architectures we
  # publish. The shared PowerShell driver also stages the CMake install tree
  # and proves that an external find_package consumer can use the ZIP.
  # ============================================================================

  windows-matrix:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        include:
          - name: windows-x64
            runner: windows-latest
            arch: x64
          - name: windows-arm64
            runner: windows-11-arm
            arch: arm64

    steps:
      - uses: actions/checkout@v4

      - name: Build, test, package, and verify
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          .\scripts\build_windows_artifact.ps1 `
            -Arch '${{ matrix.arch }}' `
            -BuildDir 'build-windows-${{ matrix.arch }}' `
            -Output '${{ runner.temp }}\moonlab-ci-${{ github.sha }}-${{ matrix.name }}.zip'

      - name: Upload Windows package
        uses: actions/upload-artifact@v4
        with:
          name: moonlab-ci-${{ matrix.name }}
          path: ${{ runner.temp }}\moonlab-ci-${{ github.sha }}-${{ matrix.name }}.zip
          if-no-files-found: error
          retention-days: 14

  # ============================================================================
  # wasm — emscripten target, separate because it doesn't share the
  # native compile toolchain with the unix matrix.
  # ============================================================================

  wasm:
    name: wasm-smoke
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Set up Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: ${{ env.EMSCRIPTEN_VERSION }}

      - name: Install build deps
        run: |
          sudo apt-get update -o Acquire::Retries=5
          sudo apt-get install -y ninja-build

      - name: Pin CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: ${{ env.CMAKE_VERSION }}

      - name: Build CLAPACK for WASM
        # CLAPACK is a hard dep for the moonlab wasm build; the
        # CMakeLists fail-fasts if neither openblas-wasm nor
        # clapack-wasm is staged.  This step fetches CLAPACK 3.2.1
        # from netlib.org and builds it through emcc.  Takes ~3-5 min
        # on the ubuntu-22.04 runner.
        run: |
          set -euxo pipefail
          cd bindings/javascript/packages/core/emscripten
          bash build-clapack-wasm.sh

      - name: Configure (emscripten)
        run: |
          set -euxo pipefail
          cd bindings/javascript/packages/core/emscripten
          mkdir -p build
          emcmake cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build moonlab.wasm
        run: |
          set -euxo pipefail
          cmake --build bindings/javascript/packages/core/emscripten/build --parallel
          ls -la bindings/javascript/packages/core/emscripten/build/moonlab.{wasm,js}

  # ============================================================================
  # docker — image build smoke (no push), uses the release Dockerfile.
  # ============================================================================

  docker-image:
    name: docker-image
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build moonlab/release image
        run: |
          set -euxo pipefail
          docker buildx build \
            --platform linux/amd64 \
            -f docker/debian/release/Dockerfile \
            --load \
            -t moonlab/release:ci .

  # ============================================================================
  # hygiene — proprietary-marker grep over the public tree.  Cheap;
  # runs in seconds; gates pushes against accidental private leak.
  # ============================================================================

  hygiene:
    name: hygiene
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Validate GitHub Actions workflows
        run: docker run --rm -v "$PWD:/repo" --workdir /repo rhysd/actionlint:1.7.12
      - name: Public-source hygiene (proprietary-marker grep)
        run: |
          set -euxo pipefail
          # Block accidental leak of tsotchke-private markers / credential
          # shapes.  Patterns intentionally simple so a maintainer can
          # eyeball false positives.
          BAD_MARKERS='tsotchke-corporation|tsotchke-private|PRIVATE_OVERLAY|CONFIDENTIAL|REDACTED-INTERNAL'
          CRED_PATTERNS='AKIA[0-9A-Z]{16}|ghp_[A-Za-z0-9]{36}|sk-[A-Za-z0-9]{48}'

          if grep -rEn --include="*.{c,h,cpp,hpp,py,rs,js,ts,md,yml,yaml,sh,cmake}" \
              -- "$BAD_MARKERS" \
              . --exclude-dir=node_modules --exclude-dir=.git --exclude-dir=build \
              --exclude-dir=build-* --exclude-dir=target ; then
              echo "::error::Proprietary marker found in public source"; exit 1
          fi
          if grep -rEn --include="*.{c,h,cpp,hpp,py,rs,js,ts,md,yml,yaml,sh,cmake}" \
              -- "$CRED_PATTERNS" \
              . --exclude-dir=node_modules --exclude-dir=.git --exclude-dir=build \
              --exclude-dir=build-* --exclude-dir=target ; then
              echo "::error::Credential pattern found in public source"; exit 1
          fi
          echo "Hygiene checks passed."
