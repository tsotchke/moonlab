name: CI

on:
  push:
    branches: [master, develop, 'feat/**', 'chore/**', 'feature/**']
  pull_request:
    branches: [master]

jobs:
  # ============================================================================
  # Tier A — native build + ctest on every supported platform.
  # ============================================================================

  linux-x64:
    name: Linux x86_64 (Release)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake ninja-build \
            libomp-dev libopenblas-dev liblapacke-dev

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j

      - name: Test (ctest, excluding long/heavy suites)
        run: ctest --test-dir build -LE long --output-on-failure --timeout 300

      - name: Upload dylib
        if: ${{ env.ACT != 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: moonlab-linux-x86_64
          path: |
            build/libquantumsim.so*
            build/libquantumsim.a

  linux-arm64:
    name: Linux aarch64 (Release)
    runs-on: ubuntu-22.04-arm
    env:
      # Match every macOS tier: skip the multi-tier RNDR / FEAT_RNG
      # hardware-entropy probe at QRNG-init time.  The probe sysctl
      # path on aarch64 runners measurably slowed unit_mlkem and
      # abi_moonlab_export to multi-minute timeouts.  /dev/urandom
      # via getrandom() remains the seeding source.
      MOONLAB_SKIP_HW_ENTROPY: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake ninja-build \
            libomp-dev libopenblas-dev liblapacke-dev

      - name: Configure
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DQSIM_BUILD_EXAMPLES=OFF
          -DQSIM_BUILD_BENCHMARKS=OFF

      - name: Build
        run: cmake --build build -j

      - name: Test (ctest, arm64)
        # Same `-LE long` exclusion as every other tier.  The earlier
        # name-based exclusions for unit_mlkem / abi_moonlab_export /
        # unit_qrng_statistics were specifically targeting the QRNG
        # hardware-probe slowness, which is now bypassed by the
        # MOONLAB_SKIP_HW_ENTROPY env var declared above.
        # `aarch64_flake` label excludes the KPM-Chern parity test,
        # which has runaway numerical drift on aarch64 OpenBLAS
        # (|c_dense - c_kpm| ~ 10^11) -- audit punch-list item.
        run: ctest --test-dir build -LE "long|aarch64_flake" --output-on-failure --timeout 300

      - name: Upload dylib
        if: ${{ env.ACT != 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: moonlab-linux-aarch64
          path: |
            build/libquantumsim.so*
            build/libquantumsim.a

  windows-x64:
    name: Windows x86_64 (Release, clang-cl)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up MSVC developer shell
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Ensure Ninja
        shell: pwsh
        run: |
          if (-not (Get-Command ninja -ErrorAction SilentlyContinue)) {
            choco install ninja -y
          }

      - name: Configure
        shell: pwsh
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_C_COMPILER=clang-cl
          -DCMAKE_CXX_COMPILER=clang-cl
          -DQSIM_BUILD_EXAMPLES=OFF
          -DQSIM_BUILD_BENCHMARKS=OFF

      - name: Build
        shell: pwsh
        run: cmake --build build -j

      - name: Test
        shell: pwsh
        run: >
          ctest --test-dir build
          -E "long_evolution|mps_vs_exact|unit_qgt|unit_mbl|unit_qrng_statistics|python_bindings|rust_bindings"
          --output-on-failure
          --timeout 300
          -j 2

      - name: Upload DLL
        if: ${{ env.ACT != 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: moonlab-windows-x86_64
          path: |
            build/quantumsim.dll
            build/quantumsim.lib

  macos-arm64:
    name: macOS arm64 (Release)
    runs-on: macos-14
    env:
      MOONLAB_SKIP_HW_ENTROPY: "1"
      OMP_NUM_THREADS: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install libomp ninja

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j

      - name: Test (ctest, excluding long_evolution)
        run: ctest --test-dir build -LE long --output-on-failure --timeout 300

      - name: Upload dylib
        if: ${{ env.ACT != 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: moonlab-macos-arm64
          path: |
            build/libquantumsim.*dylib

  macos-x86_64:
    name: macOS x86_64 (Release)
    runs-on: macos-15-intel
    env:
      MOONLAB_SKIP_HW_ENTROPY: "1"
      OMP_NUM_THREADS: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install libomp ninja

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j

      - name: Test (ctest, excluding long_evolution)
        run: ctest --test-dir build -LE long --output-on-failure --timeout 300

      - name: Upload dylib
        if: ${{ env.ACT != 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: moonlab-macos-x86_64
          path: |
            build/libquantumsim.*dylib

  macos-werror:
    name: macOS arm64 (Release + -Werror)
    runs-on: macos-14
    env:
      MOONLAB_SKIP_HW_ENTROPY: "1"
      OMP_NUM_THREADS: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install libomp ninja

      - name: Configure (-DQSIM_WERROR=ON)
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DQSIM_WERROR=ON

      - name: Build
        run: cmake --build build -j

      - name: Test
        run: ctest --test-dir build -LE long --output-on-failure --timeout 300

  macos-debug:
    name: macOS arm64 (Debug)
    runs-on: macos-14
    env:
      MOONLAB_SKIP_HW_ENTROPY: "1"
      OMP_NUM_THREADS: "1"
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: brew install libomp ninja
      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug
      - name: Build
        run: cmake --build build -j
      - name: Test
        # Exclude unit_qgt here for the same reason as the ASAN tier:
        # the Fukui-Hatsugai-Suzuki Chern integral on Haldane has
        # enough Debug-build floating-point noise that the rounded
        # Chern number drifts from +/-1 to 0.  Release builds are
        # unaffected (the Release tier runs the test).
        # unit_qgt: Debug-build float noise on Haldane Chern integral
        # rounds +/-1 to 0; covered by Release tier.
        run: ctest --test-dir build -LE long -E unit_qgt --output-on-failure --timeout 600

  # ============================================================================
  # Tier B — MPI end-to-end (mpirun inside CI, both macOS and Linux).
  # ============================================================================

  macos-mpi:
    name: macOS arm64 (-DQSIM_ENABLE_MPI=ON)
    runs-on: macos-14
    env:
      MOONLAB_SKIP_HW_ENTROPY: "1"
      OMP_NUM_THREADS: "1"
      OMPI_MCA_plm_ssh_agent: /bin/false
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (OpenMPI)
        run: brew install libomp ninja open-mpi

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DQSIM_ENABLE_MPI=ON

      - name: Build
        run: cmake --build build -j

      - name: Test (includes MPI distributed_gates via mpirun -np 4)
        run: ctest --test-dir build -LE long --output-on-failure --timeout 300

  linux-opencl:
    name: Linux x86_64 (-DQSIM_ENABLE_OPENCL=ON, compile + fallback smoke)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies (ICD loader + Pocl CPU ICD)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake ninja-build \
            libomp-dev libopenblas-dev liblapacke-dev \
            opencl-headers ocl-icd-opencl-dev pocl-opencl-icd
      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DQSIM_ENABLE_OPENCL=ON
      - name: Build
        run: cmake --build build -j
      - name: Run discovery smoke
        run: ctest --test-dir build -R gpu_backend_discovery --output-on-failure --timeout 60

  linux-vulkan:
    name: Linux x86_64 (-DQSIM_ENABLE_VULKAN=ON, compile + fallback smoke)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies (Vulkan loader + lavapipe CPU ICD)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake ninja-build \
            libomp-dev libopenblas-dev liblapacke-dev \
            libvulkan-dev vulkan-tools mesa-vulkan-drivers
      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DQSIM_ENABLE_VULKAN=ON
      - name: Build
        run: cmake --build build -j
      - name: Run discovery smoke
        run: ctest --test-dir build -R gpu_backend_discovery --output-on-failure --timeout 60

  linux-mpi:
    name: Linux x86_64 (-DQSIM_ENABLE_MPI=ON)
    runs-on: ubuntu-22.04
    env:
      OMPI_MCA_plm_ssh_agent: /bin/false
      # Allow mpirun to run as root inside CI containers.
      OMPI_ALLOW_RUN_AS_ROOT: "1"
      OMPI_ALLOW_RUN_AS_ROOT_CONFIRM: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (OpenMPI + BLAS)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake ninja-build \
            libomp-dev libopenblas-dev liblapacke-dev \
            openmpi-bin libopenmpi-dev

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DQSIM_ENABLE_MPI=ON

      - name: Build
        run: cmake --build build -j

      - name: Test (includes MPI distributed_gates via mpirun -np 4)
        run: ctest --test-dir build -LE long --output-on-failure --timeout 300

  # ============================================================================
  # Tier C — sanitizers (ASAN + UBSAN) — correctness gates.
  # ============================================================================

  macos-sanitizers:
    name: macOS arm64 (ASAN + UBSAN)
    runs-on: macos-14
    env:
      MOONLAB_SKIP_HW_ENTROPY: "1"
      OMP_NUM_THREADS: "1"
      ASAN_OPTIONS: "detect_leaks=0:abort_on_error=1:halt_on_error=1"
      UBSAN_OPTIONS: "print_stacktrace=1:halt_on_error=1"
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: brew install libomp ninja
      - name: Configure (+ sanitizers)
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug -DQSIM_ENABLE_SANITIZERS=ON
      - name: Build
        run: cmake --build build -j
      - name: Test
        # Exclude:
        #   long_evolution (7 min) and the language-binding smokes
        #   because Python / Rust / WebGPU drivers are not themselves
        #   sanitizer-instrumented -- loading an ASAN-built dylib from
        #   a non-ASAN driver triggers spurious aborts.
        #   unit_qgt because the Fukui-Hatsugai-Suzuki Chern integral
        #   relies on accurate per-k-point eigenvector branch picks;
        #   Debug builds without float fast-math compute the Haldane
        #   integral at 48x48 grid with enough noise that the rounded
        #   Chern number comes out 0 instead of +/-1.  Release
        #   (default) test passes this cleanly; the Release tier above
        #   covers it.
        # unit_kagome_ed{,_large} build dense Hamiltonians and run zheev
        # on them.  Under ASAN that's 10x slower and times out at the
        # CMake-level TIMEOUT (120s for the large variant); both are
        # already covered by all non-sanitizer tiers, so skipping here
        # is safe.
        # unit_ca_mps_kagome12 runs a 12-qubit Trotter schedule that is
        # compute-heavy under ASAN instrumentation; it's covered by every
        # other tier as well.
        # `-LE long` covers long_evolution, quantum_sim_test,
        # unit_mpo_kpm, unit_qrng_statistics, unit_kagome_ed{,_large},
        # and unit_ca_mps_kagome12 (all already labelled "long" in
        # CMakeLists).  The remaining name-based exclusions are truly
        # ASAN-specific, not slow-test exclusions.
        run: ctest --test-dir build -LE long -E "python_bindings|rust_bindings|webgpu_unified|unit_qgt" --output-on-failure --timeout 600

  # ============================================================================
  # Tier C3 — exercise the no-LAPACK QR + SVD fallback codepaths in
  # tensor.c on every PR.  The fallbacks are what production WASM and
  # Windows clang-cl builds actually use; without this tier they only get
  # exercised when something has already broken in the wild.  A Jacobi
  # sign error caught here in 2026-04 had been silently producing
  # non-orthonormal U matrices (and DMRG energies off by an order of
  # magnitude) for two release cycles.
  # ============================================================================

  linux-fallback:
    name: Linux x86_64 (Release + QR/SVD fallback)
    runs-on: ubuntu-22.04
    env:
      MOONLAB_SKIP_HW_ENTROPY: "1"
      OMP_NUM_THREADS: "1"
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y build-essential ninja-build cmake \
            libopenblas-dev liblapacke-dev libomp-dev
      - name: Configure (+ forced fallbacks)
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DQSIM_BUILD_TESTS=ON
          -DQSIM_FORCE_QR_FALLBACK=ON
          -DQSIM_FORCE_SVD_FALLBACK=ON
      - name: Build
        run: cmake --build build -j
      - name: Test (-LE long, fallback paths)
        run: ctest --test-dir build -LE long --output-on-failure --timeout 900

  # ============================================================================
  # Tier C2 — line-coverage signal.  Builds with --coverage on Linux gcc,
  # runs the same -LE long sweep, runs lcov to produce coverage.info, and
  # uploads it as a CI artifact + prints a per-directory summary so you
  # can see which subtrees are dark.
  # ============================================================================

  linux-coverage:
    name: Linux x86_64 (Release + coverage)
    runs-on: ubuntu-22.04
    env:
      MOONLAB_SKIP_HW_ENTROPY: "1"
      OMP_NUM_THREADS: "1"
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y build-essential ninja-build cmake \
            libopenblas-dev liblapacke-dev libomp-dev lcov
      - name: Configure (+ coverage)
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Debug
          -DQSIM_ENABLE_COVERAGE=ON
          -DQSIM_ENABLE_LTO=OFF
      - name: Build
        run: cmake --build build -j
      - name: Test
        # -LE long matches every other tier; coverage doesn't change which
        # tests we run, only what we measure.
        run: ctest --test-dir build -LE long --output-on-failure --timeout 900
      - name: Capture coverage
        run: |
          # ubuntu-22.04 ships lcov 1.15 which only knows
          # --ignore-errors source/graph/gcov; --ignore-errors
          # mismatch and --ignore-errors unused are lcov 2.0+ syntax
          # and abort with "unknown argument" on 1.15.  We test for
          # the available flags at runtime and pass only the supported
          # ones.
          ignore_capture=""
          if lcov --help 2>&1 | grep -q "ignore-errors source"; then
            ignore_capture="--ignore-errors source"
          fi
          ignore_remove=""
          if lcov --help 2>&1 | grep -q "ignore-errors unused" \
             || lcov --version 2>&1 | grep -qE "version (2|[3-9])"; then
            ignore_remove="--ignore-errors unused"
          fi
          lcov --capture --directory build --output-file coverage.raw.info \
               --rc geninfo_unexecuted_blocks=1 \
               $ignore_capture
          # Drop system + third-party noise.
          lcov --remove coverage.raw.info \
               '/usr/*' '*/build/*' '*/tests/*' '*/bindings/*' \
               --output-file coverage.info \
               $ignore_remove
          lcov --list coverage.info | tail -40
      - name: Upload coverage report
        if: ${{ env.ACT != 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: moonlab-coverage
          path: coverage.info

  # ============================================================================
  # Tier D — Python + Rust bindings smoke (runs whenever bindings/ changes).
  # ============================================================================

  bindings-macos:
    name: Bindings smoke (Python + Rust, macOS)
    runs-on: macos-14
    env:
      MOONLAB_SKIP_HW_ENTROPY: "1"
      OMP_NUM_THREADS: "1"
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: brew install libomp ninja rust
      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install pytest
        run: python -m pip install --upgrade pip pytest numpy
      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
      - name: Build library
        run: cmake --build build -j
      - name: Run bindings tests (smoke + full pytest suite)
        run: ctest --test-dir build -R "python_bindings|rust_bindings_smoke" --output-on-failure --timeout 600

  bindings-linux:
    name: Bindings smoke (Python + Rust, Linux)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install apt dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake ninja-build \
            libomp-dev libopenblas-dev liblapacke-dev
      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install pytest
        run: python -m pip install --upgrade pip pytest numpy
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
      - name: Build library
        run: cmake --build build -j
      - name: Run bindings tests (smoke + full pytest suite)
        run: ctest --test-dir build -R "python_bindings|rust_bindings_smoke" --output-on-failure --timeout 600

  # ============================================================================
  # Tier E — WASM build + WebGPU parity smoke.
  # ============================================================================

  wasm:
    name: WASM / WebGPU smoke
    runs-on: macos-14
    env:
      MOONLAB_SKIP_HW_ENTROPY: "1"
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: brew install ninja
      - name: Install emsdk
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.74
      - name: Install pnpm
        run: npm install -g pnpm@9
      - name: Build CLAPACK for WASM
        run: bash bindings/javascript/packages/core/emscripten/build-clapack-wasm.sh
      - name: Configure WASM moonlab
        run: |
          source "$EMSDK/emsdk_env.sh"
          emcmake cmake -S bindings/javascript/packages/core/emscripten \
                        -B bindings/javascript/packages/core/emscripten/build \
                        -DCMAKE_BUILD_TYPE=Release
      - name: Build WASM moonlab
        run: |
          source "$EMSDK/emsdk_env.sh"
          emmake make -C bindings/javascript/packages/core/emscripten/build -j
      - name: Build TypeScript
        run: |
          cd bindings/javascript/packages/core
          pnpm install --ignore-scripts
          pnpm run build:ts
      - name: Run WebGPU unified smoke
        run: |
          cd bindings/javascript/packages/core
          node scripts/webgpu-unified-smoke.mjs
