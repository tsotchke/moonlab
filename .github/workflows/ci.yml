name: CI

on:
  push:
    branches: [master, develop, 'feat/**', 'chore/**', 'feature/**']
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # Master is the public release gate — let those runs finish so we get
  # a complete matrix signal even while follow-up commits are landing.
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

# Pinned tool versions.  Bumped together so a single PR rolls every
# lane forward; do NOT pin selectively without an audit pass.
env:
  CMAKE_VERSION: '3.27.9'
  NINJA_VERSION: '1.11.1'
  PYTHON_VERSION: '3.11'
  RUST_TOOLCHAIN: '1.83.0'
  EMSCRIPTEN_VERSION: '3.1.74'
  # MOONLAB_SKIP_HW_ENTROPY=1 prevents the hardware-entropy probe from
  # blocking on the absent /dev/hwrng / RDRAND-equivalent on hosted
  # runners.  Affects bindings + WASM lanes only.
  MOONLAB_SKIP_HW_ENTROPY: '1'

jobs:
  # ============================================================================
  # unix-matrix — every Linux/macOS configuration we ship for, in one
  # matrix.  Modelled on Eshkol's CI: one job, matrix.include, every lane
  # named identically to its purpose (arch + feature).  Adding a new
  # configuration is a matrix row, not a new job block.
  # ============================================================================

  unix-matrix:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64-lite
            runner: ubuntu-22.04
            cmake_flags: ''
            test_label: ''
          - name: linux-x64-mpi
            runner: ubuntu-22.04
            cmake_flags: '-DQSIM_ENABLE_MPI=ON'
            test_label: ''
          - name: linux-x64-asan
            runner: ubuntu-22.04
            cmake_flags: '-DQSIM_ENABLE_SANITIZERS=ON -DCMAKE_BUILD_TYPE=Debug'
            test_label: 'core'
          - name: linux-arm64-lite
            runner: ubuntu-22.04-arm
            cmake_flags: ''
            test_label: ''
          - name: macos-arm64-lite
            runner: macos-14
            cmake_flags: ''
            test_label: ''
          - name: macos-arm64-mpi
            runner: macos-14
            cmake_flags: '-DQSIM_ENABLE_MPI=ON'
            test_label: ''
          - name: macos-x64-lite
            runner: macos-13
            cmake_flags: ''
            test_label: ''

    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update -o Acquire::Retries=5
          PKGS="build-essential ninja-build libomp-dev libopenblas-dev liblapacke-dev pkg-config python3-dev python3-pip"
          if [[ "${{ matrix.cmake_flags }}" == *"QSIM_ENABLE_MPI=ON"* ]]; then
              PKGS="$PKGS libopenmpi-dev openmpi-bin"
          fi
          sudo apt-get install -y $PKGS

      - name: Install Dependencies (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euxo pipefail
          brew install ninja libomp openblas pkg-config
          if [[ "${{ matrix.cmake_flags }}" == *"QSIM_ENABLE_MPI=ON"* ]]; then
              brew install open-mpi
          fi

      - name: Pin CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: ${{ env.CMAKE_VERSION }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python deps
        shell: bash
        run: pip install numpy pytest

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Configure
        shell: bash
        run: |
          set -euxo pipefail
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DQSIM_WERROR=ON \
            ${{ matrix.cmake_flags }}

      - name: Build
        shell: bash
        run: |
          set -euxo pipefail
          if [[ "${{ matrix.cmake_flags }}" == *"QSIM_ENABLE_SANITIZERS=ON"* ]]; then
              export ASAN_OPTIONS="detect_leaks=0:halt_on_error=1:allocator_may_return_null=1"
              export UBSAN_OPTIONS="halt_on_error=1:print_stacktrace=1"
          fi
          cmake --build build --parallel

      - name: Test
        timeout-minutes: 30
        shell: bash
        env:
          OMPI_MCA_plm_ssh_agent: /bin/false
          OMPI_ALLOW_RUN_AS_ROOT: 1
          OMPI_ALLOW_RUN_AS_ROOT_CONFIRM: 1
        run: |
          set -euxo pipefail
          if [[ "${{ matrix.cmake_flags }}" == *"QSIM_ENABLE_SANITIZERS=ON"* ]]; then
              export ASAN_OPTIONS="detect_leaks=0:halt_on_error=1:allocator_may_return_null=1"
              export UBSAN_OPTIONS="halt_on_error=1:print_stacktrace=1"
          fi
          TEST_FILTER=""
          if [[ -n "${{ matrix.test_label }}" ]]; then
              TEST_FILTER="-L ${{ matrix.test_label }}"
          fi
          # Exclude long-running tests to keep total runtime bounded.
          # Lanes that need the heavy suite live in the nightly workflow.
          ctest --test-dir build --output-on-failure --timeout 300 \
              -E "long|n34_to_n40|hofstadter_sweep|kagome_ed_n18" \
              $TEST_FILTER -j 4

      - name: Upload Build Log on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}-build-log
          path: |
            build/CMakeFiles/CMakeError.log
            build/CMakeFiles/CMakeOutput.log
          if-no-files-found: ignore

  # ============================================================================
  # wasm — emscripten target, separate because it doesn't share the
  # native compile toolchain with the unix matrix.
  # ============================================================================

  wasm:
    name: wasm-smoke
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Set up Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: ${{ env.EMSCRIPTEN_VERSION }}

      - name: Install build deps
        run: |
          sudo apt-get update -o Acquire::Retries=5
          sudo apt-get install -y ninja-build

      - name: Pin CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: ${{ env.CMAKE_VERSION }}

      - name: Configure (emscripten)
        run: |
          set -euxo pipefail
          cd bindings/javascript/packages/core/emscripten
          mkdir -p build
          emcmake cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build moonlab.wasm
        run: |
          set -euxo pipefail
          cmake --build bindings/javascript/packages/core/emscripten/build --parallel
          ls -la bindings/javascript/packages/core/emscripten/build/moonlab.{wasm,js}

  # ============================================================================
  # docker — image build smoke (no push), uses the release Dockerfile.
  # ============================================================================

  docker-image:
    name: docker-image
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build moonlab/release image
        run: |
          set -euxo pipefail
          docker buildx build \
            --platform linux/amd64 \
            -f docker/debian/release/Dockerfile \
            --load \
            -t moonlab/release:ci .

  # ============================================================================
  # hygiene — proprietary-marker grep over the public tree.  Cheap;
  # runs in seconds; gates pushes against accidental private leak.
  # ============================================================================

  hygiene:
    name: hygiene
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Public-source hygiene (proprietary-marker grep)
        run: |
          set -euxo pipefail
          # Block accidental leak of tsotchke-private markers / credential
          # shapes.  Patterns intentionally simple so a maintainer can
          # eyeball false positives.
          BAD_MARKERS='tsotchke-corporation|tsotchke-private|PRIVATE_OVERLAY|CONFIDENTIAL|REDACTED-INTERNAL'
          CRED_PATTERNS='AKIA[0-9A-Z]{16}|ghp_[A-Za-z0-9]{36}|sk-[A-Za-z0-9]{48}'

          if grep -rEn --include="*.{c,h,cpp,hpp,py,rs,js,ts,md,yml,yaml,sh,cmake}" \
              -- "$BAD_MARKERS" \
              . --exclude-dir=node_modules --exclude-dir=.git --exclude-dir=build \
              --exclude-dir=build-* --exclude-dir=target ; then
              echo "::error::Proprietary marker found in public source"; exit 1
          fi
          if grep -rEn --include="*.{c,h,cpp,hpp,py,rs,js,ts,md,yml,yaml,sh,cmake}" \
              -- "$CRED_PATTERNS" \
              . --exclude-dir=node_modules --exclude-dir=.git --exclude-dir=build \
              --exclude-dir=build-* --exclude-dir=target ; then
              echo "::error::Credential pattern found in public source"; exit 1
          fi
          echo "Hygiene checks passed."
