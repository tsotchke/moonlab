# Moonlab (libquantumsim) completion oracles.
#
# Consumed by ICC's completion_oracles.py. Each oracle gates a "goal" the
# assistant might be asked to drive: any goal name that contains one of the
# listed aliases (case-folded substring match) selects that oracle.
#
# Severities:
#   high   -> FAIL when criterion missing (release is BLOCKED until fixed)
#   medium -> WARN when criterion missing (tracked, does not block; nightly/advisory)
#
# ENFORCEMENT MODEL (the 2026-07-17 hardening).
# The structural criteria (test_evidence, no_stubbed_paths, no_contract_gap)
# proved too weak: they reported ready=100 while the codebase still shipped
# GPU-measurement corruption, QRNG verification theater, a reversed-CNOT MPS
# bug, and ~25 fictional README APIs. ICC's heuristics cannot see those.
#
# So every goal is now ALSO gated by a runtime_event: a real executable check
# must write a PASS line to scripts/icc_traces/*.jsonl before the criterion is
# satisfied. This mirrors the Eshkol adversarial matrix. A missing or FAIL
# event fails the criterion; there is no way to reach "ready" by assertion.
#
# Evidence producers (each script writes the JSONL its events are read from):
#   scripts/run_moonlab_release_smoke.sh -> kind: moonlab_smoke
#   scripts/run_moonlab_oracles.sh       -> kind: moonlab_oracle   (oracle lane)
#   scripts/run_fuzz.sh replay           -> kind: moonlab_fuzz      (fuzz lane)
#   scripts/run_cross_diff.sh            -> kind: moonlab_differential (differential lane)
#   scripts/run_statistical.sh           -> kind: moonlab_statistical (statistical lane)
#
# Quarantine allowlists (genuine current-HEAD bugs a harness caught, each with
# an owning lane; every entry MUST flip to required-pass before the v1.2.0 cut):
#   tests/oracle/KNOWN_FAILURES.txt
#   tests/fuzz/FINDINGS.md
#   tests/differential/KNOWN_DIVERGENCES.txt
#   tests/statistical/FINDINGS.md

oracles:
  # ---------------------------------------------------------------------------
  # THE release gate. `icc readiness --target moonlab-release-readiness
  # --trace-dir scripts/icc_traces` is the single go/no-go for the v1.2.0 cut.
  # It requires the adversarial matrix to be green (see moonlab-adversarial-
  # matrix below) PLUS the whole-system correctness/capability smoke.
  # ---------------------------------------------------------------------------
  - name: moonlab-release-readiness
    target: moonlab-release-readiness
    aliases:
      - moonlab
      - libquantumsim
      - quantum-simulator
      - quantum_simulator
      - release
    requires:
      # -- Structural floor (kept from the original oracle). --
      - id: tests_indexed
        test_evidence: true
        severity: high
        label: Focused Moonlab tests are indexed
        action: run_ctest_and_self_index
      - id: production_paths_real
        no_stubbed_paths:
          - production_fallback
          - synthetic_model_only
          - not_exercised_by_real_smoke
        severity: high
        label: Production paths are real, not stubs or fallbacks
        action: wire_real_path_or_mark_fallback
      - id: pipeline_contracts_wired
        no_contract_gap:
          - flag_without_contract
          - state_key_produced_without_consumer
          - state_key_consumed_without_producer
          - artifact_without_test_or_trace
          - checkpoint_without_test_or_trace
          - missing_expected_contract_kind
        severity: high
        label: Build/test/bench/release pipeline has no orphan flags or state keys
        action: fix_contract_graph_gap
      - id: failure_free
        runtime_check: failure_free
        severity: high
        label: Runtime trace records no failures
        action: fix_runtime_failure

      # A collection of bare PASS events is not a release certificate. This
      # event is emitted only by the fail-closed certificate validator after it
      # proves that every required lane and artifact is bound to one clean Git
      # commit/tree, the current ICC source fingerprint, the hosted-CI head,
      # the hardware mesh evidence, and the annotated tag target. It also
      # prevents traces from a pre-rewrite or dirty worktree from certifying a
      # later tag.
      - id: release_certificate_current
        runtime_event:
          event_kinds: [moonlab_release_certificate]
          event_names: ["release_certificate_valid"]
          event_values: ["PASS"]
        severity: high
        label: A fail-closed release certificate binds all evidence to the exact clean v1.2.0 source tree
        action: python3 scripts/validate_release_certificate.py

      # -- Whole-system correctness smoke (run_moonlab_release_smoke.sh). --
      - id: full_suite_green
        runtime_event:
          event_kinds: [moonlab_smoke]
          event_names: ["full_suite_green"]
          event_values: ["PASS"]
        severity: high
        label: The full ctest suite passes (no test Not Run, no failures)
        action: ./scripts/run_moonlab_release_smoke.sh
      - id: asan_clean
        runtime_event:
          event_kinds: [moonlab_smoke]
          event_names: ["asan_ubsan_clean"]
          event_values: ["PASS"]
        severity: high
        label: AddressSanitizer + UBSan clean across core/tn/ca_mps/algorithms
        action: ./scripts/run_moonlab_release_smoke.sh
      - id: ci_all_green
        runtime_event:
          event_kinds: [moonlab_smoke]
          event_names: ["ci_all_green"]
          event_values: ["PASS"]
        severity: high
        label: Every GitHub CI job on HEAD is green, hygiene included (no red, no masking)
        action: ./scripts/run_moonlab_release_smoke.sh

      # -- Audit-finding gates: each currently-broken subsystem, proven fixed. --
      - id: gpu_host_sync_contract
        runtime_event:
          event_kinds: [moonlab_smoke]
          event_names: ["gpu_host_sync_contract"]
          event_values: ["PASS"]
        severity: high
        label: No measurement/expectation reads a device-backed state without sync (no GPU corruption)
        action: wire_gpu_sync_and_prove
      - id: tdvp_projector_splitting
        runtime_event:
          event_kinds: [moonlab_smoke]
          event_names: ["tdvp_projector_splitting"]
          event_values: ["PASS"]
        severity: high
        label: TDVP is real projector-splitting (backward step present; real-time vs analytic reference)
        action: implement_real_tdvp_and_validate
      - id: zero_phantom_api
        runtime_event:
          event_kinds: [moonlab_smoke]
          event_names: ["zero_phantom_api"]
          event_values: ["PASS"]
        severity: high
        label: icc phantom-api reports zero declared-never-defined symbols
        action: define_or_remove_phantom_decls
      - id: zero_odr_collision
        runtime_event:
          event_kinds: [moonlab_smoke]
          event_names: ["zero_odr_collision"]
          event_values: ["PASS"]
        severity: high
        label: icc odr-audit reports zero cross-subsystem type/symbol collisions
        action: rename_colliding_definitions
      - id: hidden_visibility_abi
        runtime_event:
          event_kinds: [moonlab_smoke]
          event_names: ["hidden_visibility_abi"]
          event_values: ["PASS"]
        severity: high
        label: ABI test + bindings smoke pass under QSIM_HIDDEN_VISIBILITY=ON (tagged surface suffices)
        action: tag_moonlab_api_surface
      - id: docs_apis_exist
        runtime_event:
          event_kinds: [moonlab_smoke]
          event_names: ["docs_apis_exist"]
          event_values: ["PASS"]
        severity: high
        label: Every API named in README/docs code snippets resolves to a real header symbol
        action: rewrite_docs_against_real_headers
      - id: examples_all_build
        runtime_event:
          event_kinds: [moonlab_smoke]
          event_names: ["examples_all_build"]
          event_values: ["PASS"]
        severity: high
        label: Every example source is a registered target and compiles (no orphaned examples)
        action: register_and_fix_examples
      - id: binding_versions_synced
        runtime_event:
          event_kinds: [moonlab_smoke]
          event_names: ["binding_versions_synced"]
          event_values: ["PASS"]
        severity: high
        label: version_tool check passes (all bindings + README badge + ABI in sync)
        action: sync_versions
      - id: bindings_suites_green
        runtime_event:
          event_kinds: [moonlab_smoke]
          event_names: ["bindings_suites_green"]
          event_values: ["PASS"]
        severity: high
        label: Python pytest + Rust cargo test + JS vitest all pass
        action: fix_binding_suites

      # -- Capability completion: beyond what Moonlab describes itself as. --
      - id: mpi_sharded_gpu_works
        runtime_event:
          event_kinds: [moonlab_smoke]
          event_names: ["mpi_sharded_gpu_works"]
          event_values: ["PASS"]
        severity: high
        label: Sharded MPI+CUDA state vector runs >32 qubits across multiple GPUs with halo swaps
        action: implement_multigpu_sharding_and_fleet_validate
      - id: qrng_certification_wired
        runtime_event:
          event_kinds: [moonlab_smoke]
          event_names: ["qrng_certification_wired"]
          event_values: ["PASS"]
        severity: high
        label: Bell/DI certification consumes the delivered byte stream (no verification theater)
        action: wire_qrng_di_into_output_path
      - id: mlkem_official_kat
        runtime_event:
          event_kinds: [moonlab_smoke]
          event_names: ["mlkem_official_kat"]
          event_values: ["PASS"]
        severity: high
        label: ML-KEM validated against official ACVP vectors (not self-generated fingerprints)
        action: embed_official_acvp_vectors

      # -- The adversarial matrix must be green (mirror of the sub-target). --
      - id: adversarial_matrix_green
        runtime_event:
          event_kinds: [moonlab_oracle, moonlab_fuzz, moonlab_differential, moonlab_statistical]
          event_names:
            - backend_differential_oracle
            - gradient_oracle
            - measurement_statistics_oracle
            - edge_matrix_oracle
            - property_invariants_oracle
            - fuzz_corpus_clean
            - cross_backend_differential
            - cross_binding_python
            - reference_oracle_agreement
            - qrng_statistical_battery
            - qrng_bias_positive_control
            - mlkem_negative_fuzz
            - mlkem_avalanche
            - entropy_health_rejects_bad
          event_values: ["PASS"]
        severity: high
        label: Full adversarial matrix (differential + fuzz + statistical + property) is green
        action: run_moonlab_oracles_and_siblings

      # -- v1.2.0 bug-closure campaign (.icc/BUG_CLOSURE_CAMPAIGN.md). --
      # The 2026-07-17 hunt found 10 real defects; the tag is blocked until every
      # one is closed. This gate is PASS only when every adversarial-lane
      # allowlist (oracle/differential/scaling KNOWN_* + fuzz crashes-pending) is
      # empty -- a live quarantine entry is an OPEN bug.
      - id: all_discovered_bugs_closed
        runtime_event:
          event_kinds: [moonlab_smoke]
          event_names: ["all_discovered_bugs_closed"]
          event_values: ["PASS"]
        severity: high
        label: Every quarantined bug from the adversarial hunt is fixed (all allowlists empty)
        action: ./scripts/run_moonlab_release_smoke.sh
      - id: deep_hunt_thread_safety
        runtime_event:
          event_kinds: [moonlab_tsan]
          event_names: ["tsan_clean"]
          event_values: ["PASS"]
        severity: high
        label: ThreadSanitizer finds no data races/deadlocks in shared state + hot path
        action: ./scripts/run_tsan.sh
      - id: deep_hunt_numerical
        runtime_event:
          event_kinds: [moonlab_numerical]
          event_names: ["numerical_edge_clean"]
          event_values: ["PASS"]
        severity: high
        label: Numerical edge cases (SVD/eigen/denormal/scale) match references; no non-isometry
        action: ./scripts/run_numerical.sh
      - id: deep_hunt_scaling
        runtime_event:
          event_kinds: [moonlab_scaling]
          event_names: ["scaling_differential_clean"]
          event_values: ["PASS"]
        severity: high
        label: Large-n differential clean (no S1 bulk-bond norm / S2 TDVP scaling divergence)
        action: ./scripts/run_scaling.sh

  # ---------------------------------------------------------------------------
  # The adversarial matrix as its own target, so it can be driven and reported
  # independently. Owned by the oracle lane + fuzz/differential/statistical lanes.
  # ---------------------------------------------------------------------------
  - name: moonlab-adversarial-matrix
    target: moonlab-adversarial-matrix
    aliases:
      - adversarial
      - oracle-matrix
      - fuzz
      - differential
      - generative
    requires:
      - id: backend_differential
        runtime_event:
          event_kinds: [moonlab_oracle]
          event_names: ["backend_differential_oracle"]
          event_values: ["PASS"]
        severity: high
        label: P1 dense-vs-MPS-vs-Clifford backend differential agrees to tolerance
        action: ./scripts/run_moonlab_oracles.sh
      - id: gradient_oracle
        runtime_event:
          event_kinds: [moonlab_oracle]
          event_names: ["gradient_oracle"]
          event_values: ["PASS"]
        severity: high
        label: P2 adjoint vs parameter-shift vs finite-difference gradient agreement
        action: ./scripts/run_moonlab_oracles.sh
      - id: measurement_statistics
        runtime_event:
          event_kinds: [moonlab_oracle]
          event_names: ["measurement_statistics_oracle"]
          event_values: ["PASS"]
        severity: high
        label: P3 sampling frequencies match exact probabilities; collapse consistency
        action: ./scripts/run_moonlab_oracles.sh
      - id: edge_matrix
        runtime_event:
          event_kinds: [moonlab_oracle]
          event_names: ["edge_matrix_oracle"]
          event_values: ["PASS"]
        severity: high
        label: P5 feature-composition edge matrix (fusion/canonical/noise interleavings)
        action: ./scripts/run_moonlab_oracles.sh
      - id: property_invariants
        runtime_event:
          event_kinds: [moonlab_oracle]
          event_names: ["property_invariants_oracle"]
          event_values: ["PASS"]
        severity: high
        label: P6 metamorphic invariants (unitarity, reversibility, entropy bounds, isometry)
        action: ./scripts/run_moonlab_oracles.sh
      - id: fuzz_corpus_clean
        runtime_event:
          event_kinds: [moonlab_fuzz]
          event_names: ["fuzz_corpus_clean"]
          event_values: ["PASS"]
        severity: high
        label: Every untrusted-input fuzz surface replays its corpus with no ASan/UBSan crash
        action: ./scripts/run_fuzz.sh replay
      - id: cross_backend_differential
        runtime_event:
          event_kinds: [moonlab_differential]
          event_names: ["cross_backend_differential"]
          event_values: ["PASS"]
        severity: high
        label: All backends agree with the independent reference oracle
        action: ./scripts/run_cross_diff.sh
      - id: cross_binding_python
        runtime_event:
          event_kinds: [moonlab_differential]
          event_names: ["cross_binding_python"]
          event_values: ["PASS"]
        severity: high
        label: Python binding reproduces the reference probabilities
        action: ./scripts/run_cross_diff.sh
      - id: qrng_statistical_battery
        runtime_event:
          event_kinds: [moonlab_statistical]
          event_names: ["qrng_statistical_battery"]
          event_values: ["PASS"]
        severity: high
        label: Conditioned QRNG passes the SP800-22-lite + PractRand-lite battery
        action: ./scripts/run_statistical.sh
      - id: qrng_bias_positive_control
        runtime_event:
          event_kinds: [moonlab_statistical]
          event_names: ["qrng_bias_positive_control"]
          event_values: ["PASS"]
        severity: high
        label: The battery has teeth (raw biased path is detected as biased)
        action: ./scripts/run_statistical.sh
      - id: mlkem_negative_fuzz
        runtime_event:
          event_kinds: [moonlab_statistical]
          event_names: ["mlkem_negative_fuzz"]
          event_values: ["PASS"]
        severity: high
        label: ML-KEM decaps never crashes/OOB on malformed input; implicit rejection holds
        action: ./scripts/run_statistical.sh
      - id: mlkem_avalanche
        runtime_event:
          event_kinds: [moonlab_statistical]
          event_names: ["mlkem_avalanche"]
          event_values: ["PASS"]
        severity: high
        label: ML-KEM shared secret avalanches on one-bit input change
        action: ./scripts/run_statistical.sh
      - id: entropy_health_rejects_bad
        runtime_event:
          event_kinds: [moonlab_statistical]
          event_names: ["entropy_health_rejects_bad"]
          event_values: ["PASS"]
        severity: high
        label: SP800-90B health tests reject pathological streams and pass genuine entropy
        action: ./scripts/run_statistical.sh
      # -- Nightly / advisory (medium): do not block the PR-time gate. --
      - id: cross_binding_rust
        runtime_event:
          event_kinds: [moonlab_differential]
          event_names: ["cross_binding_rust"]
          event_values: ["PASS"]
        severity: medium
        label: Rust binding reproduces the reference probabilities (nightly)
        action: ./scripts/run_cross_diff.sh
      - id: cross_binding_js
        runtime_event:
          event_kinds: [moonlab_differential]
          event_names: ["cross_binding_js"]
          event_values: ["PASS"]
        severity: medium
        label: WASM/JS binding reproduces the reference probabilities (nightly)
        action: ./scripts/run_cross_diff.sh
      - id: constant_time_variance
        runtime_event:
          event_kinds: [moonlab_statistical]
          event_names: ["constant_time_variance"]
          event_values: ["PASS"]
        severity: medium
        label: ML-KEM decaps timing shows no valid/invalid class separation (informational on noisy CI)
        action: ./scripts/run_statistical.sh
      # -- Deep-hunt lanes (2026-07-17): races, numerics, large-n scaling. --
      - id: tsan_clean
        runtime_event:
          event_kinds: [moonlab_tsan]
          event_names: ["tsan_clean"]
          event_values: ["PASS"]
        severity: high
        label: No data races or deadlocks under ThreadSanitizer
        action: ./scripts/run_tsan.sh
      - id: numerical_edge_clean
        runtime_event:
          event_kinds: [moonlab_numerical]
          event_names: ["numerical_edge_clean"]
          event_values: ["PASS"]
        severity: high
        label: Numerical edge/ill-conditioning battery clean (incl no-LAPACK SVD isometry)
        action: ./scripts/run_numerical.sh
      - id: scaling_differential_clean
        runtime_event:
          event_kinds: [moonlab_scaling]
          event_names: ["scaling_differential_clean"]
          event_values: ["PASS"]
        severity: high
        label: Large-n cross-backend differential clean (MPS gate norm + TDVP scaling)
        action: ./scripts/run_scaling.sh
      - id: all_discovered_bugs_closed
        runtime_event:
          event_kinds: [moonlab_smoke]
          event_names: ["all_discovered_bugs_closed"]
          event_values: ["PASS"]
        severity: high
        label: Every adversarial-lane quarantine allowlist is empty (all found bugs fixed)
        action: ./scripts/run_moonlab_release_smoke.sh

  # ---------------------------------------------------------------------------
  # ABI readiness (kept, tightened with a hidden-visibility runtime gate).
  # ---------------------------------------------------------------------------
  - name: moonlab-abi-readiness
    target: moonlab-abi-readiness
    aliases:
      - abi
      - moonlab_export
      - moonlab-bindings
      - bindings
      - qgtl
    requires:
      - id: cmake_flags_indexed
        contract_kind: CLIFlag
        severity: high
        label: CMake options surfaced as CLI flags are indexed
        action: add_or_index_cliflag_contract
      - id: pipeline_phases_indexed
        contract_kind: PipelinePhase
        severity: high
        label: Configure / build / test / install phases are indexed
        action: add_or_index_pipelinephase_contract
      - id: abi_state_keys_connected
        no_contract_gap:
          - state_key_consumed_without_producer
          - state_key_produced_without_consumer
        severity: high
        label: ABI symbols have producers and consumers wired
        action: wire_state_key_producer_or_consumer
      - id: abi_paths_real
        no_stubbed_paths:
          - production_fallback
          - synthetic_model_only
          - not_exercised_by_real_smoke
        severity: high
        label: Exported ABI is backed by real implementations
        action: wire_real_path_or_mark_fallback
      - id: abi_tests_indexed
        test_evidence: true
        severity: high
        label: ABI / bindings tests are indexed
        action: run_abi_smoke_tests_and_self_index
      - id: abi_hidden_visibility
        runtime_event:
          event_kinds: [moonlab_smoke]
          event_names: ["hidden_visibility_abi"]
          event_values: ["PASS"]
        severity: high
        label: Tagged ABI surface suffices under QSIM_HIDDEN_VISIBILITY=ON
        action: tag_moonlab_api_surface
      - id: failure_free
        runtime_check: failure_free
        severity: high
        label: Runtime trace records no ABI / binding failures
        action: fix_runtime_failure

  # ---------------------------------------------------------------------------
  # CA-TN paper readiness (unchanged).
  # ---------------------------------------------------------------------------
  - name: ca-tn-paper-readiness
    target: ca-tn-paper-readiness
    aliases:
      - ca-mps
      - ca-tn
      - ca-peps
      - var-d
      - paper
      - preprint
      - arxiv
    requires:
      - id: camps_tests_indexed
        test_evidence: true
        severity: high
        label: CA-MPS / CA-PEPS / var-D test suite indexed
        action: run_ctest_camps_label_and_self_index
      - id: paper_artifacts_emitted_or_indexed
        runtime_or_contract:
          events: [artifact, checkpoint]
          contracts: [Artifact, Checkpoint]
        severity: high
        label: Paper benchmark JSONs are emitted or indexed
        action: emit_expected_artifact_or_add_probe
      - id: paper_artifacts_validated
        no_contract_gap:
          - artifact_without_test_or_trace
          - checkpoint_without_test_or_trace
        severity: medium
        label: Bench artifacts have validators or runtime traces
        action: add_artifact_validator_or_runtime_probe
      - id: paper_paths_real
        no_stubbed_paths:
          - production_fallback
          - synthetic_model_only
          - not_exercised_by_real_smoke
        severity: high
        label: Numerics for the paper come from real production paths
        action: wire_real_path_or_mark_fallback
      - id: failure_free
        runtime_check: failure_free
        severity: high
        label: Runtime trace records no failures in CA-TN benches
        action: fix_runtime_failure
